                                    </div>
                                    <div className="p-4 border-t border-slate-200 flex gap-3">
                                        <button onClick={() => setAssignModal({ isOpen: false, adminUserId: null, adminName: '', assigned: [], employees: [] })} className="flex-1 px-4 py-2.5 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition">취소</button>
                                        <button onClick={async () => {
                                            try {
                                                await supabaseClient.from('admin_assignments').delete().eq('admin_user_id', assignModal.adminUserId);
                                                if (assignModal.assigned.length > 0) {
                                                    const rows = assignModal.assigned.map(empId => ({ admin_user_id: assignModal.adminUserId, employee_id: empId }));
                                                    await supabaseClient.from('admin_assignments').insert(rows);
                                                }
                                                setAssignModal({ isOpen: false, adminUserId: null, adminName: '', assigned: [], employees: [] });
                                                setModal({ isOpen: true, title: '저장 완료', message: '직원 할당이 저장되었습니다.', type: 'success', action: closeModal });
                                            } catch(err) {
                                                alert('저장 실패: ' + err.message);
                                            }
                                        }} className="flex-1 px-4 py-2.5 bg-teal-600 text-white font-medium rounded-xl hover:bg-teal-700 transition">저장</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        </div>

                        {/* 임시 저장 불러오기 모달 (리더 내 프로젝트) */}
                        {draftModal.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-slate-800">임시 저장 목록</h3>
                                        <button onClick={() => setDraftModal({ isOpen: false, drafts: [] })} className="p-1 text-slate-400 hover:text-slate-700 transition">
                                            <X size={20} />
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1 p-4">
                                        {draftModal.drafts.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <FileText size={32} className="mx-auto mb-3 opacity-50" />
                                                <p>임시 저장된 데이터가 없습니다.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                {draftModal.drafts.map((draft) => {
                                                    const dt = new Date(draft.savedAt);
                                                    const dateStr = dt.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
                                                    const timeStr = dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                                    const projCount = draft.employeeData?.projects?.length || 0;
                                                    return (
                                                        <div key={draft.id} className="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-blue-300 transition group">
                                                            <button onClick={() => loadDraft(draft)} className="flex-1 text-left">
                                                                <p className="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">
                                                                    {draft.period?.year} {draft.period?.quarter}
                                                                </p>
                                                                <p className="text-xs text-slate-500 mt-0.5">
                                                                    {dateStr} {timeStr} · 프로젝트 {projCount}건
                                                                </p>
                                                            </button>
                                                            <button onClick={() => deleteDraft(draft.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition opacity-0 group-hover:opacity-100">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 과거 데이터 불러오기 진행 모달 */}
                        {importProgress.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <Upload size={20} className="text-teal-600" />
                                            과거 데이터 불러오기
                                        </h3>
                                        {importProgress.isComplete && (
                                            <button onClick={() => setImportProgress({ isOpen: false, total: 0, current: 0, results: [], isComplete: false })} className="p-1 text-slate-400 hover:text-slate-700 transition">
                                                <X size={20} />
                                            </button>
                                        )}
                                    </div>
                                    <div className="p-5 flex-1 overflow-y-auto">
                                        {/* Progress Bar */}
                                        <div className="mb-4">
                                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-1.5">
                                                <span>{importProgress.isComplete ? '완료' : '처리 중...'}</span>
                                                <span>{importProgress.current} / {importProgress.total}</span>
                                            </div>
                                            <div className="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                                                <div className={`h-full rounded-full transition-all duration-300 ${importProgress.isComplete ? 'bg-green-500' : 'bg-teal-500'}`}
                                                    style={{ width: `${importProgress.total > 0 ? (importProgress.current / importProgress.total * 100) : 0}%` }} />
                                            </div>
                                        </div>

                                        {/* Results */}
                                        <div className="space-y-2">
                                            {importProgress.results.map((r, idx) => (
                                                <div key={idx} className={`p-3 rounded-xl border text-sm ${r.success ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                                    <div className="flex items-center gap-2">
                                                        {r.success ? <CheckCircle size={16} className="text-green-600 flex-shrink-0" /> : <AlertCircle size={16} className="text-red-600 flex-shrink-0" />}
                                                        <span className="font-bold text-slate-800 truncate">{r.file}</span>
                                                    </div>
                                                    {r.success ? (
                                                        <p className="text-green-700 text-xs mt-1 ml-6">{r.name} · {r.period} · 프로젝트 {r.projects}건 저장 완료</p>
                                                    ) : (
                                                        <p className="text-red-700 text-xs mt-1 ml-6">{r.error}</p>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        {importProgress.isComplete && (
                                            <div className="mt-4 pt-4 border-t border-slate-200">
                                                <div className="flex items-center justify-between">
                                                    <div className="text-sm text-slate-600">
                                                        <span className="font-bold text-green-600">{importProgress.results.filter(r => r.success).length}</span>건 성공
                                                        {importProgress.results.filter(r => !r.success).length > 0 && (
                                                            <span className="ml-2"><span className="font-bold text-red-600">{importProgress.results.filter(r => !r.success).length}</span>건 실패</span>
                                                        )}
                                                    </div>
                                                    <button onClick={() => setImportProgress({ isOpen: false, total: 0, current: 0, results: [], isComplete: false })}
                                                        className="px-5 py-2 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition text-sm">
                                                        확인
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 템플릿 선택 모달 (팀장 페이지) */}
                        {templatePickerOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" onClick={() => setTemplatePickerOpen(false)}>
                                <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-lg w-full border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                                    <div className="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-white flex items-center gap-2"><Bookmark size={18} className="text-blue-400" /> 템플릿에서 추가</h3>
                                        <button onClick={() => setTemplatePickerOpen(false)} className="p-1 text-slate-400 hover:text-white transition"><X size={20} /></button>
                                    </div>
                                    <div className="p-4 space-y-2 max-h-[60vh] overflow-y-auto">
                                        {projectTemplates.length === 0 ? (
                                            <p className="text-center text-slate-500 py-8">저장된 템플릿이 없습니다.</p>
                                        ) : projectTemplates.map(tpl => (
                                            <button key={tpl.id} onClick={() => { applyTemplate(tpl); setTemplatePickerOpen(false); }} className="w-full text-left p-4 bg-slate-700/50 rounded-xl hover:bg-slate-700 border border-slate-600/50 hover:border-blue-500/50 transition group">
                                                <div className="flex items-center justify-between">
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-white font-bold group-hover:text-blue-400 transition">{tpl.name}</p>
                                                        <div className="flex flex-wrap gap-1.5 mt-1.5">
                                                            {tpl.project.role && <span className="text-[10px] px-1.5 py-0.5 bg-slate-600 text-slate-300 rounded">{tpl.project.role}</span>}
                                                            {tpl.project.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/50 text-blue-300 rounded">{tpl.project.contribution}</span>}
                                                            {tpl.project.opsStatus && <span className="text-[10px] px-1.5 py-0.5 bg-amber-900/50 text-amber-300 rounded">{tpl.project.opsStatus}</span>}
                                                        </div>
                                                        {tpl.project.kpi && <p className="text-xs text-slate-500 mt-1">KPI: {tpl.project.kpi}</p>}
                                                    </div>
                                                    <div className="ml-3 shrink-0 opacity-0 group-hover:opacity-100 transition">
                                                        <span className="text-xs font-bold text-blue-400 bg-blue-900/30 px-3 py-1.5 rounded-lg">추가</span>
                                                    </div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="px-6 py-3 border-t border-slate-700 bg-slate-800/50">
                                        <p className="text-[11px] text-slate-500">클릭하면 해당 프로젝트가 바로 추가됩니다. 날짜는 비워진 상태로 추가됩니다.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // LEADER REVIEW
            if (mode === 'leader-review') {
                const overallScore = calculateIncentiveScore(importedData.projects, leaderEval);

                return (
                    <div className="min-h-screen bg-slate-900 pb-32">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={() => setMode('leader-home')} className="flex items-center gap-2 text-slate-300 hover:text-white transition font-medium">
                                    <ChevronLeft size={18} /> 돌아가기
                                </button>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm font-bold text-white">{importedData.name} - {period.year} {period.quarter}</span>
                                    <div className="flex gap-2 no-print">
                                        {currentUser?.role === 'leader' && (
                                            <button onClick={generateAiInterview} className="flex items-center gap-2 px-3 py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg hover:from-purple-700 hover:to-blue-700 transition text-sm font-bold shadow-lg">
                                                <Activity size={16} /> AI 면담
                                            </button>
                                        )}
                                        <button onClick={downloadLeaderJPG} className="flex items-center gap-2 px-3 py-2 bg-slate-700 text-slate-200 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                            <DownloadImage size={16} /> JPG 다운로드
                                        </button>
                                        <button onClick={() => window.print()} className="flex items-center gap-2 px-3 py-2 bg-slate-700 text-slate-200 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                            <Printer size={16} /> 인쇄
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="leader-content-area" className="max-w-6xl mx-auto px-4 py-8">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8">
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">{importedData.name} - 리더 피드백</h2>
                                <p className="text-slate-500 mb-6">{period.year} {period.quarter}</p>

                                <SummaryTable projects={importedData.projects} />

                                <div className="space-y-6">
                                    {importedData.projects.map((project, idx) => (
                                        <ProjectCard
                                            key={project.id || idx}
                                            project={project}
                                            index={idx}
                                            isLeader={true}
                                            onUpdate={() => {}}
                                            leaderEvalData={leaderEval[idx]}
                                            onUpdateLeaderEval={updateLeaderEval}
                                        />
                                    ))}
                                </div>

                                <AdditionalInfoSection data={importedData} onChange={() => {}} isLeader={true} />

                                <CompensationCard overallScore={overallScore} setCompData={setCompData} compData={compData} />
                            </div>
                        </div>

                        <div className="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 shadow-2xl no-print">
                            <div className="max-w-6xl mx-auto px-4 py-4 flex gap-3">
                                <button onClick={() => setMode('leader-home')} className="flex-1 py-3 bg-slate-700 text-slate-200 rounded-lg font-bold hover:bg-slate-600 transition">
                                    취소
                                </button>
                                <button onClick={confirmLeaderComplete} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                                    <Save size={18} /> 저장 및 리포트 보기
                                </button>
                            </div>
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />

                        {renderAiInterviewModal()}
                    </div>
                );
            }

            // LEADER REPORT (DASHBOARD)
            if (mode === 'leader-report') {
                const overallScore = calculateIncentiveScore(importedData.projects, leaderEval);
                const numScore = Number(overallScore);
                let grade = 'B-C'; let gradeColor = 'text-gray-300 bg-slate-700';
                if (numScore >= 9.0) { grade = 'S'; gradeColor = 'text-purple-300 bg-purple-900/50'; }
                else if (numScore >= 8.0) { grade = 'A'; gradeColor = 'text-green-300 bg-green-900/50'; }

                const downloadReportImage = () => {
                    const element = document.getElementById('report-capture-area');
                    if (!element) return;
                    html2canvas(element, {
                        scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#0f172a',
                        ignoreElements: (el) => el.classList.contains('no-print') || el.hasAttribute('data-html2canvas-ignore')
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `리포트_${importedData.name}_${period.year}${period.quarter}.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                        link.click();
                    });
                };

                return (
                    <div className="min-h-screen bg-slate-900">
                        {/* Header */}
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg no-print">
                            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
                                <div className="flex gap-2">
                                    <button onClick={() => setMode('leader-home')} className="flex items-center gap-1.5 px-4 py-2 bg-slate-700 text-slate-200 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        <ChevronLeft size={16} /> 목록으로
                                    </button>
                                    <button onClick={() => setMode('leader-review')} className="flex items-center gap-1.5 px-4 py-2 bg-slate-700 text-slate-200 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        수정 화면으로
                                    </button>
                                </div>
                                <h1 className="text-lg font-bold text-white">리포트</h1>
                                <div className="flex gap-2">
                                    {currentUser?.role === 'leader' && (
                                        <button onClick={generateAiInterview} className="flex items-center gap-1.5 px-4 py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg hover:from-purple-700 hover:to-blue-700 transition text-sm font-bold shadow-lg">
                                            <Activity size={16} /> AI 면담
                                        </button>
                                    )}
                                    <button onClick={downloadReportImage} className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-bold">
                                        <Printer size={16} /> 리포트 출력 (PDF)
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="report-capture-area" className="max-w-5xl mx-auto px-4 py-8 space-y-6">
                            {/* Employee Summary Card */}
                            <div className="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 p-6">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-full bg-slate-700 flex items-center justify-center text-slate-400">
                                            <User size={28} />
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-bold text-white">{importedData.name}</h2>
                                            <p className="text-slate-400 text-sm">{importedData.empId} / {importedData.dept || '-'} / {importedData.responsibilities || '-'}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Incentive Score</p>
                                            <p className="text-3xl font-black text-white">{overallScore} <span className="text-base font-normal text-slate-400">/ 10</span></p>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Confirmed Level</p>
                                            <p className="text-3xl font-black text-white">{compData.level || '-'}</p>
                                        </div>
                                        <div className={`text-center px-5 py-3 rounded-xl ${gradeColor}`}>
                                            <p className="text-[10px] font-bold uppercase tracking-wider opacity-70">Incentive Grade</p>
                                            <p className="text-3xl font-black">{grade}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 보상 제안 내역 */}
                            <div className="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 p-6">
                                <h3 className="text-lg font-bold text-white mb-5">보상 제안 내역</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div>
                                        <p className="text-xs text-slate-400 font-medium mb-1">Current Level & Salary</p>
                                        <p className="text-slate-300 font-medium">{compData.currentLevel || '-'} / {compData.currentSalary ? formatNumber(compData.currentSalary) + ' 원' : '0 원'}</p>
                                        <div className="mt-4">
                                            <p className="text-xs text-blue-400 font-bold mb-1">제안 인센티브</p>
                                            <p className="text-2xl font-black text-white">{compData.isIncentiveTarget && compData.incentiveAmount ? formatNumber(compData.incentiveAmount) + ' 원' : '0 원'}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="text-xs text-blue-400 font-bold mb-1">제안 연봉 (확정안)</p>
                                        {compData.isSalaryTarget ? (
                                            <p className="text-2xl font-black text-white">{compData.salaryAmount ? formatNumber(compData.salaryAmount) + ' 원' : '-'}</p>
                                        ) : (
                                            <p className="text-lg text-slate-500">연봉 협상 대상자 아님</p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* 리더 피드백 */}
                            <div className="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 p-6">
                                <h3 className="text-lg font-bold text-white mb-5">리더 피드백</h3>
                                <div className="space-y-5">
                                    <div>
                                        <p className="flex items-center gap-2 text-sm font-bold text-blue-400 mb-2"><ThumbsUp size={16} /> 강점 및 긍정적 피드백</p>
                                        <div className="bg-slate-700/50 rounded-xl p-4 min-h-[40px]">
                                            <p className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{compData.strength || '내용 없음'}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="flex items-center gap-2 text-sm font-bold text-amber-400 mb-2"><TrendingUp size={16} /> 개선 및 성장 제안</p>
                                        <div className="bg-slate-700/50 rounded-xl p-4 min-h-[40px]">
                                            <p className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{compData.improvements || '내용 없음'}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="flex items-center gap-2 text-sm font-bold text-cyan-400 mb-2"><Target size={16} /> 커리어 레벨에 대한 의견</p>
                                        <div className="bg-slate-700/50 rounded-xl p-4 min-h-[40px]">
                                            <p className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{compData.levelOpinion || '내용 없음'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 프로젝트별 세부 성과 분석 */}
                            <div className="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 p-6">
                                <h3 className="text-lg font-bold text-white mb-5 flex items-center gap-2">
                                    <List size={18} className="text-slate-400" /> 프로젝트별 세부 성과 분석
                                </h3>
                                <div className="border-b border-slate-600 pb-2 mb-2 grid grid-cols-12 text-[10px] font-bold text-slate-400 uppercase">
                                    <div className="col-span-6">프로젝트 및 역할</div>
                                    <div className="col-span-3 text-center">KPI</div>
                                    <div className="col-span-3 text-right">평가 결과</div>
                                </div>
                                {importedData.projects.map((proj, idx) => {
                                    const evalData = leaderEval[idx];
                                    const avg = calculateAverage(evalData);
                                    const projGrade = getGrade(avg);
                                    const isReportExpanded = reportExpandedProjIdx === idx;
                                    return (
                                        <div key={proj.id || idx}>
                                            <div className="grid grid-cols-12 py-4 border-b border-slate-700 last:border-b-0 items-start cursor-pointer hover:bg-slate-700/30 transition rounded-lg px-2" onClick={() => setReportExpandedProjIdx(isReportExpanded ? null : idx)}>
                                                <div className="col-span-6">
                                                    <div className="flex items-center gap-2">
                                                        <p className="font-bold text-white text-sm">{proj.name || '-'}</p>
                                                        <ChevronDown size={14} className={`text-slate-400 transition-transform ${isReportExpanded ? 'rotate-180' : ''}`} />
                                                    </div>
                                                    <p className="text-slate-400 text-xs mt-0.5">
                                                        {proj.actStart || '-'} ~ {proj.isOngoing ? '진행중' : (proj.actEnd || '-')}
                                                        {' '}
                                                        <span className="text-blue-400 font-bold">{getDurationText(proj.actStart, proj.isOngoing ? new Date() : proj.actEnd)}</span>
                                                    </p>
                                                    <div className="flex flex-wrap gap-1 mt-1.5">
                                                        {proj.role && <span className="inline-block px-1.5 py-0.5 bg-slate-700 text-slate-300 text-[10px] font-medium rounded">{proj.role}</span>}
                                                        {proj.contribution && <span className="inline-block px-1.5 py-0.5 bg-blue-900/50 text-blue-300 text-[10px] font-bold rounded border border-blue-800">{proj.contribution}</span>}
                                                        {proj.opsStatus && <span className="inline-block px-1.5 py-0.5 bg-amber-900/50 text-amber-300 text-[10px] font-medium rounded border border-amber-800">{proj.opsStatus.split('(')[0]}</span>}
                                                    </div>
                                                </div>
                                                <div className="col-span-3 text-center text-xs text-slate-300 pt-1">
                                                    {proj.kpi || '-'}
                                                </div>
                                                <div className="col-span-3 text-right">
                                                    <p className="text-xl font-black text-white">{avg}</p>
                                                    <span className={`inline-block mt-0.5 px-2 py-0.5 rounded text-[10px] font-bold ${projGrade === 'S' ? 'bg-purple-900/50 text-purple-300' : projGrade === 'A' ? 'bg-green-900/50 text-green-300' : 'bg-slate-700 text-slate-300'}`}>{projGrade}</span>
                                                </div>
                                            </div>
                                            {isReportExpanded && evalData && (
                                                <div className="animate-slideDown bg-slate-900/50 rounded-xl mx-2 mb-3 p-4 border border-slate-700/50">
                                                    <p className="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">리더 피드백 세부 점수</p>
                                                    <div className="grid grid-cols-4 gap-3 mb-4">
                                                        {[
                                                            { label: '업무 속도', value: evalData.scoreSpeed, color: 'blue' },
                                                            { label: '업무 퀄리티', value: evalData.scoreQuality, color: 'green' },
                                                            { label: '커뮤니케이션', value: evalData.scoreComm, color: 'purple' },
                                                            { label: '정확성/신뢰도', value: evalData.scoreAccuracy, color: 'amber' }
                                                        ].map((item, i) => (
                                                            <div key={i} className="bg-slate-800 rounded-lg p-3 text-center border border-slate-700">
                                                                <p className={`text-[10px] font-bold text-${item.color}-400 mb-1`}>{item.label}</p>
                                                                <p className="text-lg font-black text-white">{item.value || '-'}</p>
                                                                <p className="text-[10px] text-slate-500">/ 10</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {evalData.notes && (
                                                        <div>
                                                            <p className="text-xs font-bold text-slate-400 mb-2">리더 코멘트</p>
                                                            <div className="bg-slate-800 rounded-lg p-3 border border-slate-700">
                                                                <p className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{evalData.notes}</p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                        {renderAiInterviewModal()}
                    </div>
                );
            }

            return null;
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('React Error:', error, info); }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', { style: { padding: '40px', textAlign: 'center', color: '#ef4444', fontFamily: 'monospace' } },
                        React.createElement('h2', null, '렌더링 오류 발생'),
                        React.createElement('pre', { style: { textAlign: 'left', background: '#1e293b', color: '#f8fafc', padding: '20px', borderRadius: '12px', overflow: 'auto', maxHeight: '300px', fontSize: '12px' } },
                            this.state.error?.toString() + '\n\n' + (this.state.error?.stack || ''))
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>

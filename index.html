            // AI 면담 생성 함수 (마스터 전용)
            const generateAiInterview = () => {
                const projects = importedData.projects || [];
                const empName = importedData.name || '직원';
                const periodStr = `${period.year} ${period.quarter}`;
                const overallScore = calculateIncentiveScore(projects, leaderEval);
                const numScore = Number(overallScore);

                // 프로젝트별 평가 분석
                const projectAnalysis = projects.map((proj, idx) => {
                    const ev = leaderEval[idx] || {};
                    const speed = Number(ev.scoreSpeed || 0);
                    const quality = Number(ev.scoreQuality || 0);
                    const comm = Number(ev.scoreComm || 0);
                    const accuracy = Number(ev.scoreAccuracy || 0);
                    const scores = [speed, quality, comm, accuracy].filter(s => s > 0);
                    const avg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : null;
                    return {
                        name: proj.name || `프로젝트 ${idx + 1}`,
                        role: proj.role || '',
                        contribution: proj.contribution || '',
                        kpi: proj.kpi || '',
                        notes: proj.notes || '',
                        opsStatus: proj.opsStatus || '',
                        speed, quality, comm, accuracy,
                        avg: avg ? parseFloat(avg) : null,
                        evalNotes: ev.notes || ''
                    };
                });

                const scoredProjects = projectAnalysis.filter(p => p.avg !== null);
                const bestProject = scoredProjects.length > 0 ? scoredProjects.reduce((a, b) => (a.avg || 0) >= (b.avg || 0) ? a : b) : null;
                const weakProject = scoredProjects.length > 1 ? scoredProjects.reduce((a, b) => (a.avg || 10) <= (b.avg || 10) ? a : b) : null;

                // 강점/약점 분석
                const allSpeed = scoredProjects.map(p => p.speed).filter(Boolean);
                const allQuality = scoredProjects.map(p => p.quality).filter(Boolean);
                const allComm = scoredProjects.map(p => p.comm).filter(Boolean);
                const allAccuracy = scoredProjects.map(p => p.accuracy).filter(Boolean);
                const avgByCategory = {
                    speed: allSpeed.length > 0 ? (allSpeed.reduce((a,b)=>a+b,0)/allSpeed.length).toFixed(1) : '-',
                    quality: allQuality.length > 0 ? (allQuality.reduce((a,b)=>a+b,0)/allQuality.length).toFixed(1) : '-',
                    comm: allComm.length > 0 ? (allComm.reduce((a,b)=>a+b,0)/allComm.length).toFixed(1) : '-',
                    accuracy: allAccuracy.length > 0 ? (allAccuracy.reduce((a,b)=>a+b,0)/allAccuracy.length).toFixed(1) : '-'
                };

                const categoryScores = [
                    { key: 'speed', label: '업무 속도', score: parseFloat(avgByCategory.speed) || 0 },
                    { key: 'quality', label: '업무 품질', score: parseFloat(avgByCategory.quality) || 0 },
                    { key: 'comm', label: '커뮤니케이션', score: parseFloat(avgByCategory.comm) || 0 },
                    { key: 'accuracy', label: '정확도', score: parseFloat(avgByCategory.accuracy) || 0 }
                ].filter(c => c.score > 0).sort((a, b) => b.score - a.score);

                const strengths = categoryScores.filter(c => c.score >= 7);
                const weaknesses = categoryScores.filter(c => c.score < 6);

                // 등급 결정
                let grade = 'B';
                if (numScore >= 9.0) grade = 'S';
                else if (numScore >= 8.0) grade = 'A';
                else if (numScore >= 6.0) grade = 'B';
                else if (numScore >= 4.0) grade = 'C';
                else if (numScore > 0) grade = 'D';

                // 면담 톤 결정
                const isExcellent = numScore >= 8.0;
                const isGood = numScore >= 6.0 && numScore < 8.0;
                const needsImprovement = numScore > 0 && numScore < 6.0;
                const notEvaluated = numScore === 0;

                // 보상 정보
                const currentSalary = compData?.currentSalary ? Number(compData.currentSalary) : 0;
                const salaryAmount = compData?.salaryAmount ? Number(compData.salaryAmount) : 0;
                const incentiveAmount = compData?.incentiveAmount ? Number(compData.incentiveAmount) : 0;
                const currentLevel = compData?.currentLevel || '';
                const confirmedLevel = compData?.level || '';

                // 자기계발 목표
                const nextGoals = importedData.nextGoals || '';
                const improvements = importedData.improvements || '';

                // ===== 면담 프로세스 생성 =====
                const interviewProcess = [
                    { step: 1, title: '오프닝 & 라포 형성', duration: '3~5분', desc: '편안한 분위기 조성, 면담 목적 안내' },
                    { step: 2, title: '성과 데이터 공유', duration: '5~7분', desc: '프로젝트별 성과와 점수를 함께 확인' },
                    { step: 3, title: '강점 인정 및 격려', duration: '3~5분', desc: '우수한 영역에 대한 구체적 칭찬' },
                    { step: 4, title: '개선 영역 논의', duration: '5~7분', desc: '부족한 부분에 대한 건설적 피드백' },
                    { step: 5, title: '목표 설정 및 성장 계획', duration: '5분', desc: '다음 분기 목표와 역량 개발 방향 합의' },
                    { step: 6, title: '보상 안내 (해당 시)', duration: '3분', desc: '레벨/연봉/인센티브 변동 사항 공유' },
                    { step: 7, title: '클로징', duration: '2~3분', desc: '종합 정리 및 응원의 메시지' }
                ];

                // ===== 면담 스크립트 생성 =====
                const scripts = [];

                // STEP 1: 오프닝
                scripts.push({
                    step: 1,
                    title: '오프닝 & 라포 형성',
                    icon: '👋',
                    lines: [
                        { speaker: 'leader', text: `${empName}님, 바쁜 와중에 시간 내주셔서 감사합니다. 오늘은 ${periodStr} 성과 면담을 진행하려고 합니다.` },
                        { speaker: 'leader', text: '이번 분기에 정말 다양한 프로젝트를 수행해주셨는데, 그 과정에서 느낀 점이나 어려웠던 부분이 있으셨나요?' },
                        { speaker: 'tip', text: '직원이 자유롭게 이야기할 수 있도록 경청하는 자세를 보여주세요. 고개를 끄덕이며 "네, 그렇군요"와 같은 리액션이 효과적입니다.' }
                    ]
                });

                // STEP 2: 성과 데이터 공유
                const projSummaryLines = [];
                projSummaryLines.push({ speaker: 'leader', text: `이번 분기에 총 ${projects.length}개의 프로젝트를 수행해주셨습니다. 각 프로젝트별 성과를 함께 확인해볼까요?` });

                if (bestProject) {
                    projSummaryLines.push({ speaker: 'leader', text: `먼저 "${bestProject.name}"${bestProject.contribution ? ` (${bestProject.contribution})` : ''}의 경우, 평균 ${bestProject.avg}점으로 가장 우수한 성과를 보여주셨습니다.${bestProject.evalNotes ? ` ${bestProject.evalNotes}` : ''}` });
                }

                projectAnalysis.filter(p => p.avg !== null && p !== bestProject).forEach(proj => {
                    if (proj.avg >= 7) {
                        projSummaryLines.push({ speaker: 'leader', text: `"${proj.name}"도 ${proj.avg}점으로 좋은 성과를 보여주셨습니다.${proj.evalNotes ? ` 특히, ${proj.evalNotes}` : ''}` });
                    }
                });

                if (weakProject && weakProject !== bestProject && weakProject.avg < 6) {
                    projSummaryLines.push({ speaker: 'leader', text: `다만, "${weakProject.name}"의 경우 ${weakProject.avg}점으로 아쉬운 부분이 있었는데요. 이 부분에 대해 ${empName}님 생각은 어떠신가요?` });
                    projSummaryLines.push({ speaker: 'tip', text: '직원의 설명을 경청한 후, 원인 분석에 초점을 맞추세요. 비난이 아닌 이해의 관점에서 접근합니다.' });
                }

                if (numScore > 0) {
                    projSummaryLines.push({ speaker: 'leader', text: `종합적으로 이번 분기 평균 점수는 ${overallScore}점(${grade}등급)입니다.` });
                }

                scripts.push({ step: 2, title: '성과 데이터 공유', icon: '📊', lines: projSummaryLines });

                // STEP 3: 강점 인정
                const strengthLines = [];
                if (strengths.length > 0) {
                    const strengthNames = strengths.map(s => `${s.label}(${s.score}점)`).join(', ');
                    strengthLines.push({ speaker: 'leader', text: `${empName}님의 이번 분기 강점 영역은 ${strengthNames}입니다.` });

                    strengths.forEach(s => {

                                        <p>· 직원이 말하는 동안 끊지 말고 충분히 경청하세요.</p>
                                        <p>· 약속한 지원 사항은 반드시 이행하세요.</p>
                                        <p>· 면담 내용은 기밀로 유지하고, 신뢰를 지켜주세요.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="px-6 py-4 border-t border-slate-700 bg-slate-800/50 shrink-0 flex justify-end gap-3">
                                <button onClick={() => setAiInterviewModal({ isOpen: false, data: null })} className="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition">
                                    닫기
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const loadEmployeeForLeader = async (empId, rpId) => {
                setIsLoading(true);
                try {
                    const result = await SupabaseAPI.loadForLeaderReview(empId, rpId);
                    if (result && result.employee) {
                        setImportedData({
                            name: result.employee.name || '', empId: result.employee.emp_id || '',
                            dept: result.employee.dept || '', responsibilities: result.employee.responsibilities || '',
                            projects: result.projects || [], nextGoals: result.nextGoals || '', improvements: result.improvements || '',
                            period: result.period
                        });
                        setLeaderEval(result.leaderEval || {});
                        setCompData(result.compData);
                        setReviewPeriodId(rpId);
                        setSelectedEmployeeId(empId);
                        if (result.period) setPeriod(result.period);
                        setMode('leader-review');
                    }
                } catch (err) {
                    setModal({ isOpen: true, title: '오류', message: '데이터 로드 실패: ' + err.message, type: 'danger', action: closeModal });
                }
                setIsLoading(false);
            };

            const viewReportDirectly = async (empId, rpId) => {
                setIsLoading(true);
                try {
                    const result = await SupabaseAPI.loadForLeaderReview(empId, rpId);
                    if (result && result.employee) {
                        setImportedData({
                            name: result.employee.name || '', empId: result.employee.emp_id || '',
                            dept: result.employee.dept || '', responsibilities: result.employee.responsibilities || '',
                            projects: result.projects || [], nextGoals: result.nextGoals || '', improvements: result.improvements || '',
                            period: result.period
                        });
                        setLeaderEval(result.leaderEval || {});
                        setCompData(result.compData);
                        setReviewPeriodId(rpId);
                        setSelectedEmployeeId(empId);
                        if (result.period) setPeriod(result.period);
                        setMode('leader-report');
                    }
                } catch (err) {
                    setModal({ isOpen: true, title: '오류', message: '리포트 로드 실패: ' + err.message, type: 'danger', action: closeModal });
                }
                setIsLoading(false);
            };

            const loadDashboardData = async (year, quarter) => {
                setDashboardQuarter({ year, quarter });
                try {
                    const emps = currentUser?.role === 'admin'
                        ? (() => { const empIds = allReviewData.map(r => r.employee); return empIds; })()
                        : await SupabaseAPI.getAllEmployees();

                    const dashItems = [];
                    for (const emp of emps) {
                        const { data: rp } = await supabaseClient.from('review_periods').select('*')
                            .eq('employee_id', emp.id).eq('year', year).eq('quarter', quarter).maybeSingle();
                        if (!rp) continue;

                        const { data: projects } = await supabaseClient.from('projects').select('*').eq('review_period_id', rp.id);
                        const { data: evals } = await supabaseClient.from('leader_evaluations').select('*').eq('review_period_id', rp.id);
                        const { data: comp } = await supabaseClient.from('compensation').select('*').eq('review_period_id', rp.id).maybeSingle();

                        let totalScore = 0; let scoredCount = 0;
                        (evals || []).forEach(ev => {
                            const scores = [ev.score_speed, ev.score_quality, ev.score_comm, ev.score_accuracy].filter(s => s);
                            if (scores.length > 0) {
                                totalScore += scores.reduce((a, b) => a + b, 0) / scores.length;
                                scoredCount++;
                            }
                        });
                        const avgScore = scoredCount > 0 ? (totalScore / scoredCount).toFixed(1) : '-';

                        let grade = '-'; let gradeColor = 'text-slate-400 bg-slate-700/50';
                        const numScore = parseFloat(avgScore);
                        if (!isNaN(numScore)) {
                            if (numScore >= 9.0) { grade = 'S'; gradeColor = 'text-purple-400 bg-purple-900/50'; }
                            else if (numScore >= 8.0) { grade = 'A'; gradeColor = 'text-green-400 bg-green-900/50'; }
                            else if (numScore >= 6.0) { grade = 'B'; gradeColor = 'text-blue-400 bg-blue-900/50'; }
                            else if (numScore >= 4.0) { grade = 'C'; gradeColor = 'text-amber-400 bg-amber-900/50'; }
                            else { grade = 'D'; gradeColor = 'text-red-400 bg-red-900/50'; }
                        }

                        const empUser = userAccounts.find(u => u.employee_id === emp.id);
                        dashItems.push({
                            employee: emp,
                            reviewPeriod: rp,
                            team: empUser?.team || '',
                            projectCount: (projects || []).length,
                            projects: (projects || []),
                            evals: (evals || []),
                            avgScore,
                            grade,
                            gradeColor,
                            level: comp?.confirmed_level || '-',
                            currentLevel: comp?.current_level || '-',
                            incentive: comp?.incentive_amount || 0,
                            isReviewed: rp.is_leader_reviewed,
                            isModified: rp.is_modified,
                            submittedAt: rp.submitted_at
                        });
                    }

                    dashItems.sort((a, b) => {
                        const sa = parseFloat(a.avgScore) || 0;
                        const sb = parseFloat(b.avgScore) || 0;
                        return sb - sa;
                    });

                    setDashboardData(dashItems);
                } catch (err) {
                    console.error('Dashboard load error:', err);
                    setDashboardData([]);
                }
            };

            // 대시보드 자동 로드: 첫 유입 시 최신 분기 자동 선택
            useEffect(() => {
                if (leaderActiveTab !== 'dashboard' || leaderMyDashboard) return;
                if (dashboardAutoLoaded || dashboardQuarter) return;
                if (!allReviewData || allReviewData.length === 0) return;
                // allReviewData에서 submitted_at이 있는 최신 분기 찾기
                const allPeriods = [];
                allReviewData.forEach(({ periods }) => {
                    (periods || []).forEach(pd => {
                        if (pd.submitted_at) {
                            allPeriods.push(pd);
                        }
                    });
                });
                if (allPeriods.length === 0) return;
                // 최신 분기 정렬
                allPeriods.sort((a, b) => {
                    if (String(a.year) !== String(b.year)) return String(b.year).localeCompare(String(a.year));
                    return b.quarter.localeCompare(a.quarter);
                });
                const latest = allPeriods[0];
                setDashboardAutoLoaded(true);
                setDashboardYear(Number(latest.year) || new Date().getFullYear());
                loadDashboardData(String(latest.year), latest.quarter);
            }, [leaderActiveTab, leaderMyDashboard, allReviewData, dashboardAutoLoaded, dashboardQuarter]);

            // 팀 대시보드 아코디언 토글
            const toggleDashboardExpand = (employeeId, projects, evals) => {
                if (dashboardExpandedId === employeeId) {
                    setDashboardExpandedId(null);
                    setDashboardExpandedProjects([]);
                } else {
                    setDashboardExpandedId(employeeId);
                    // evals를 project_id로 매핑
                    const evalMap = {};
                    (evals || []).forEach(ev => { evalMap[ev.project_id] = ev; });
                    const projsWithEval = (projects || []).map(p => ({
                        ...p,
                        eval: evalMap[p.id] || null
                    }));
                    setDashboardExpandedProjects(projsWithEval);
                }
            };

            // Reusable refresh function for allReviewData
            const refreshAllReviewData = useCallback(async () => {
                if (!dbConnected || !currentUser) return;
                try {
                    if (currentUser.role === 'admin') {
                        const { data: assignments } = await supabaseClient.from('admin_assignments').select('employee_id').eq('admin_user_id', currentUser.user_id);
                        const assignedEmpIds = (assignments || []).map(a => a.employee_id);
                        if (assignedEmpIds.length > 0) {
                            const { data: emps } = await supabaseClient.from('employees').select('*').in('id', assignedEmpIds);
                            const reviews = await Promise.all((emps || []).map(async (emp) => {
                                const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                                return { employee: emp, periods };
                            }));
                            setAllReviewData(reviews);
                        } else {
                            setAllReviewData([]);
                        }
                    } else {
                        const emps = await SupabaseAPI.getAllEmployees();
                        const reviews = await Promise.all(emps.map(async (emp) => {
                            const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                            return { employee: emp, periods };
                        }));
                        setAllReviewData(reviews);
                    }
                } catch (err) {
                    console.error('Refresh error:', err);
                }
            }, [dbConnected, currentUser]);

            // Import Historical Data (과거 데이터 불러오기)
            const [importProgress, setImportProgress] = useState({ isOpen: false, total: 0, current: 0, results: [], isComplete: false });

            const importHistoricalData = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;
                e.target.value = ''; // reset input

                setImportProgress({ isOpen: true, total: files.length, current: 0, results: [], isComplete: false });
                const results = [];

                for (let i = 0; i < files.length; i++) {
                    try {
                        const text = await files[i].text();
                        const parsed = JSON.parse(text);

                        if (!parsed.name || !parsed.empId || !parsed.period) {
                            results.push({ file: files[i].name, success: false, error: '필수 필드 누락 (name, empId, period)' });
                            setImportProgress(prev => ({ ...prev, current: i + 1, results: [...results] }));
                            continue;
                        }

                        // 1. Save employee + projects
                        const empData = {
                            name: parsed.name,
                            empId: parsed.empId,
                            dept: parsed.dept || '',
                            responsibilities: parsed.responsibilities || '',
                            projects: parsed.projects || [],
                            nextGoals: parsed.nextGoals || '',
                            improvements: parsed.improvements || ''
                        };
                        const periodData = parsed.period;
                        const { employeeId, reviewPeriodId } = await SupabaseAPI.saveEmployeeData(empData, periodData, true);

                        // 2. Save leader evaluations if present
                        if (parsed.leaderEvaluations || parsed.compData) {
                            const leaderEvalData = parsed.leaderEvaluations || {};
                            const compImport = parsed.compData || {
                                level: '', currentLevel: '', incentiveAmount: '', salaryAmount: '', currentSalary: '',
                                strength: '', improvements: '', levelOpinion: '', isIncentiveTarget: false, isSalaryTarget: false
                            };
                            await SupabaseAPI.saveLeaderFeedback(reviewPeriodId, employeeId, parsed.projects || [], leaderEvalData, compImport);
                        }

                        // 3. Mark as leader reviewed if applicable
                        if (parsed.isLeaderReviewed) {
                            await supabaseClient.from('review_periods').update({ is_leader_reviewed: true }).eq('id', reviewPeriodId);
                        }

                        results.push({ file: files[i].name, success: true, name: parsed.name, period: `${periodData.year} ${periodData.quarter}`, projects: (parsed.projects || []).length });
                    } catch (err) {
                        results.push({ file: files[i].name, success: false, error: err.message });
                    }
                    setImportProgress(prev => ({ ...prev, current: i + 1, results: [...results] }));
                }

                setImportProgress(prev => ({ ...prev, isComplete: true, results }));

                // Refresh employee list
                await refreshAllReviewData();
            };

            // LOGIN SCREEN
            if (mode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full">
                            <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white font-black text-xl shadow-lg shadow-blue-600/30">
                                CP
                            </div>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-1">Project Canvas</h1>
                            <p className="text-center text-slate-400 text-sm mb-8">시스템에 접속하려면 로그인을 진행하세요.</p>

                            <div className="space-y-5">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">ID</label>
                                    <input type="text" value={loginId} onChange={(e) => setLoginId(e.target.value)} placeholder="아이디를 입력하세요"
                                        className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition bg-slate-50" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">PASSWORD</label>
                                    <input type="password" value={loginPw} onChange={(e) => setLoginPw(e.target.value)} placeholder="비밀번호를 입력하세요"
                                        onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }}
                                        className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition bg-slate-50" />
                                </div>

                                {loginError && (
                                    <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
                                        <AlertCircle size={16} />
                                        {loginError}
                                    </div>
                                )}

                                <button onClick={handleLogin} className="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
                                    로그인 <ChevronRight size={18} />
                                </button>

                                <p className="text-center text-xs text-slate-400 mt-4">© 2026 CHEONGAHM. All rights reserved.</p>
                            </div>
                        </div>
                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // PASSWORD CHANGE SCREEN
            if (mode === 'change-password') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full">
                            <div className="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-amber-500/30">
                                <AlertCircle size={28} />
                            </div>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">비밀번호 변경 필요</h1>
                            <p className="text-center text-slate-400 text-sm mb-8">처음 로그인입니다. 새로운 비밀번호를 설정해주세요.</p>

                            <div className="space-y-4">
                                <InputField label="현재 비밀번호" type="password" value={currentPw} onChange={(e) => setCurrentPw(e.target.value)} placeholder="현재 비밀번호" />
                                <InputField label="새 비밀번호" type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="새 비밀번호" />
                                <InputField label="비밀번호 확인" type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} placeholder="새 비밀번호 확인" />

                                {pwChangeError && (
                                    <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 flex items-center gap-2">
                                        <AlertCircle size={16} />
                                        {pwChangeError}
                                    </div>
                                )}

                                <button onClick={handlePasswordChange} className="w-full py-3 bg-amber-600 text-white rounded-lg font-bold hover:bg-amber-700 transition">
                                    비밀번호 변경
                                </button>
                            </div>
                        </div>
                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // MEMBER HOME
            if (mode === 'member-home') {
                const availableQuarters = getAvailableQuarters();
                const writableQuarters = availableQuarters.filter(q => {
                    return !myReviewPeriods.some(p => p.year === q.year && p.quarter === q.quarter);
                });

                return (
                    <div className="min-h-screen bg-slate-900 pb-20">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                                <h1 className="text-xl font-bold text-white">Project Canvas</h1>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-slate-300">{currentUser?.name}님</span>
                                    <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-700 text-slate-100 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        <LogOut size={16} /> 로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-5xl mx-auto px-4 py-6">
                            {/* Member Tabs */}
                            <div className="flex gap-1 mb-6 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                {[
                                    { key: 'home', label: '홈', icon: Home },
                                    { key: 'dashboard', label: '성과 대시보드', icon: Activity },
                                    { key: 'templates', label: '프로젝트 템플릿', icon: Bookmark },
                                    { key: 'memos', label: '업무 메모', icon: StickyNote }
                                ].map(tab => (
                                    <button key={tab.key} onClick={() => { setMemberActiveTab(tab.key); if (tab.key === 'dashboard') loadMemberDashboard(); }}
                                        className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition ${memberActiveTab === tab.key ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                                        <tab.icon size={16} /> {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* TAB: 홈 */}
                            {memberActiveTab === 'home' && (
                                <>
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-8 mb-8">
                                        <div className="flex items-start gap-6">
                                            <div className="flex-1">
                                                <h2 className="text-2xl font-bold text-white mb-2">내 프로젝트 캔버스</h2>
                                                <p className="text-slate-400 mb-6">안녕하세요, {currentUser?.name}님</p>

                                                {writableQuarters.length > 0 ? (
                                                    <div className="flex flex-wrap gap-3">
                                                        {writableQuarters.map(q => (
                                                            <button key={`${q.year}-${q.quarter}`} onClick={() => startMemberWrite(q)} className="px-6 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition flex items-center gap-2">
                                                                <Plus size={20} /> {q.year}년 {q.quarter} 작성하기
                                                            </button>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className="px-4 py-3 bg-slate-700/50 rounded-lg border border-slate-600 text-sm text-slate-400">
                                                        <CheckCircle size={16} className="inline mr-1.5 text-green-500" />
                                                        이번 분기 작성이 완료되었습니다.
                                                    </div>
                                                )}
                                            </div>

                                            {/* 카운트다운 영역 */}
                                            {countdownData && countdownData.is_active && countdownRemaining && (
                                                <div className="w-72 shrink-0 bg-gradient-to-br from-slate-700/80 to-slate-800 rounded-xl border border-slate-600 p-5 text-center">
                                                    <div className="flex items-center justify-center gap-2 mb-3">
                                                        <Clock size={16} className="text-amber-400" />
                                                        <p className="text-sm font-bold text-amber-400">{countdownData.title}</p>
                                                    </div>
                                                    {countdownRemaining.expired ? (
                                                        <p className="text-lg font-bold text-red-400">마감 시간이 지났습니다</p>
                                                    ) : (
                                                        <>
                                                            <div className="flex justify-center gap-2 mb-3">
                                                                <div className="bg-slate-900/80 rounded-lg px-3 py-2 min-w-[56px]">
                                                                    <p className="text-2xl font-black text-white tabular-nums">{String(countdownRemaining.days).padStart(2,'0')}</p>
                                                                    <p className="text-[10px] text-slate-500 mt-0.5">일</p>
                                                                </div>
                                                                <div className="bg-slate-900/80 rounded-lg px-3 py-2 min-w-[56px]">
                                                                    <p className="text-2xl font-black text-white tabular-nums">{String(countdownRemaining.hours).padStart(2,'0')}</p>
                                                                    <p className="text-[10px] text-slate-500 mt-0.5">시간</p>
                                                                </div>
                                                                <div className="bg-slate-900/80 rounded-lg px-3 py-2 min-w-[56px]">
                                                                    <p className="text-2xl font-black text-white tabular-nums">{String(countdownRemaining.minutes).padStart(2,'0')}</p>
                                                                    <p className="text-[10px] text-slate-500 mt-0.5">분</p>
                                                                </div>
                                                                <div className="bg-slate-900/80 rounded-lg px-3 py-2 min-w-[56px]">
                                                                    <p className="text-2xl font-black text-amber-400 tabular-nums">{String(countdownRemaining.seconds).padStart(2,'0')}</p>
                                                                    <p className="text-[10px] text-slate-500 mt-0.5">초</p>
                                                                </div>
                                                            </div>
                                                            <p className="text-[11px] text-slate-500">
                                                                마감: {new Date(countdownData.deadline).toLocaleString('ko-KR', {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}
                                                            </p>
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="text-lg font-bold text-white mb-4">작성 이력</h3>
                                        {myReviewPeriods.length === 0 ? (
                                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6 text-center">
                                                <FileText size={32} className="mx-auto mb-4 text-slate-600" />
                                                <p className="text-slate-400">아직 작성한 항목이 없습니다.</p>
                                            </div>
                                        ) : (
                                            myReviewPeriods.map((pd) => (
                                                <button key={pd.id} onClick={() => loadExistingPeriod(pd.id)} className="w-full bg-slate-800 rounded-xl border border-slate-700 p-4 flex items-center justify-between hover:border-slate-500 transition text-left group cursor-pointer">
                                                    <div>
                                                        <p className="font-bold text-white group-hover:text-blue-400 transition">{pd.year} {pd.quarter}</p>
                                                        <div className="flex flex-wrap gap-x-3 gap-y-0.5 mt-0.5">
                                                            <p className="text-xs text-slate-500">작성일: {new Date(pd.created_at).toLocaleDateString('ko-KR')}</p>
                                                            {pd.submitted_at && <p className="text-xs text-slate-500">제출: {new Date(pd.submitted_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                            {pd.updated_at && pd.submitted_at && new Date(pd.updated_at).getTime() !== new Date(pd.submitted_at).getTime() && Math.abs(new Date(pd.updated_at).getTime() - new Date(pd.submitted_at).getTime()) > 60000 && <p className="text-xs text-amber-400">수정: {new Date(pd.updated_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        {pd.is_modified && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400">수정됨</span>}
                                                        <span className={`text-xs font-bold px-3 py-1 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-blue-900/50 text-blue-400'}`}>
                                                            {pd.is_leader_reviewed ? '확인 완료' : '작성완료'}
                                                        </span>
                                                        <ChevronRight size={16} className="text-slate-500 group-hover:text-blue-400 transition" />
                                                    </div>
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </>
                            )}

                            {/* TAB: 성과 대시보드 */}
                            {memberActiveTab === 'dashboard' && (() => {
                                if (!memberDashboardData) return (
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                        <Activity size={40} className="mx-auto mb-4 text-slate-600 animate-pulse" />
                                        <p className="text-slate-400">대시보드 데이터를 불러오는 중...</p>
                                    </div>
                                );
                                if (memberDashboardData.length === 0) return (
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                        <Activity size={40} className="mx-auto mb-4 text-slate-600" />
                                        <p className="text-slate-400">아직 제출된 성과 데이터가 없습니다.</p>
                                    </div>
                                );

                                // Quarter filter options
                                const dashQuarters = memberDashboardData.map(d => `${d.period.year} ${d.period.quarter}`);
                                const filteredDashData = memberDashFilter === 'all' ? memberDashboardData : memberDashboardData.filter(d => `${d.period.year} ${d.period.quarter}` === memberDashFilter);

                                return (
                                    <div className="space-y-4">
                                        {/* Quarter Filter */}
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <button onClick={() => setMemberDashFilter('all')} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${memberDashFilter === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-white'}`}>전체</button>
                                            {dashQuarters.map(q => (
                                                <button key={q} onClick={() => setMemberDashFilter(q)} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${memberDashFilter === q ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-white'}`}>{q}</button>
                                            ))}
                                        </div>

                                        {/* Period cards - compact */}
                                        {filteredDashData.map((item) => {
                                            const pd = item.period;
                                            const projs = item.projects;
                                            const evals = item.evals;
                                            const evalMap = {};
                                            evals.forEach(ev => { evalMap[ev.project_id] = ev; });
                                            let avgScore = null;
                                            if (pd.is_leader_reviewed && evals.length > 0) {
                                                let total = 0; let count = 0;
                                                evals.forEach(ev => { [ev.score_speed, ev.score_quality, ev.score_comm, ev.score_accuracy].forEach(s => { if (s) { total += s; count++; } }); });
                                                if (count > 0) avgScore = (total / count).toFixed(1);
                                            }

                                            return (
                                                <div key={pd.id} className="bg-slate-800 rounded-xl border border-slate-700">
                                                    {/* Period Header - compact single line */}
                                                    <div className="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-white font-bold">{pd.year} {pd.quarter}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-amber-900/50 text-amber-400'}`}>
                                                                {pd.is_leader_reviewed ? '검토완료' : '검토대기'}
                                                            </span>
                                                            <span className="text-xs text-slate-500">· {projs.length}건</span>
                                                        </div>
                                                        {avgScore && <span className="text-sm font-bold text-white">평균 <span className="text-blue-400">{avgScore}</span><span className="text-slate-500 text-xs"> / 10</span></span>}
                                                    </div>
                                                    {/* Project List - clickable accordion */}
                                                    <div className="divide-y divide-slate-700/50">
                                                        {projs.map((proj) => {
                                                            const ev = evalMap[proj.id];
                                                            const scores = ev ? [ev.score_speed, ev.score_quality, ev.score_comm, ev.score_accuracy].filter(Boolean) : [];
                                                            const projAvg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : null;
                                                            const isProjExpanded = myDashExpandedProjId === proj.id;
                                                            return (
                                                                <div key={proj.id}>
                                                                    <div onClick={() => setMyDashExpandedProjId(isProjExpanded ? null : proj.id)} className={`px-5 py-3 flex items-center gap-4 cursor-pointer hover:bg-slate-700/30 transition ${isProjExpanded ? 'bg-slate-700/30' : ''}`}>
                                                                        <div className="flex-1 min-w-0">
                                                                            <div className="flex items-center gap-2">
                                                                                <ChevronDown size={12} className={`text-slate-500 transition-transform duration-200 shrink-0 ${isProjExpanded ? 'rotate-180' : ''}`} />
                                                                                <span className="text-slate-200 text-sm font-medium truncate">{proj.name || '(이름 없음)'}</span>
                                                                                {proj.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/40 text-blue-300 rounded shrink-0">{proj.contribution}</span>}
                                                                            </div>
                                                                            <span className="text-[11px] text-slate-500 ml-5">{proj.act_start || '-'} ~ {proj.is_ongoing ? '진행중' : (proj.act_end || '-')}</span>
                                                                        </div>
                                                                        {projAvg ? (
                                                                            <div className="flex items-center gap-2 shrink-0">
                                                                                <div className="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                                                                    <div className="h-full rounded-full" style={{ width: `${(projAvg / 10) * 100}%`, backgroundColor: projAvg >= 8 ? '#22c55e' : projAvg >= 6 ? '#eab308' : '#ef4444' }}></div>
                                                                                </div>
                                                                                <span className="text-xs font-bold text-white w-6 text-right">{projAvg}</span>
                                                                            </div>
                                                                        ) : (
                                                                            <span className="text-[10px] text-slate-600 shrink-0">미평가</span>
                                                                        )}
                                                                    </div>
                                                                    {isProjExpanded && (
                                                                        <div className="bg-slate-900/50 px-6 py-4 border-t border-slate-700/30 animate-slideDown">
                                                                            <div className="grid grid-cols-2 gap-x-6 gap-y-2.5 text-sm">
                                                                                {proj.role && <div><span className="text-slate-500 text-xs">역할</span><p className="text-slate-200">{proj.role}</p></div>}
                                                                                {proj.ops_status && <div><span className="text-slate-500 text-xs">운영 상태</span><p className="text-slate-200">{proj.ops_status}</p></div>}
                                                                                {proj.kpi && <div className="col-span-2"><span className="text-slate-500 text-xs">KPI</span><p className="text-slate-200">{proj.kpi}</p></div>}
                                                                                {proj.notes && <div className="col-span-2"><span className="text-slate-500 text-xs">비고</span><p className="text-slate-300">{proj.notes}</p></div>}
                                                                            </div>
                                                                            {ev && (
                                                                                <div className="mt-3 pt-3 border-t border-slate-700/30">
                                                                                    <p className="text-xs text-slate-400 font-bold mb-2">리더 평가</p>
                                                                                    <div className="flex items-center gap-4 flex-wrap">
                                                                                        {ev.score_speed && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">속도</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_speed}</span></div>}
                                                                                        {ev.score_quality && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">품질</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_quality}</span></div>}
                                                                                        {ev.score_comm && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">소통</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_comm}</span></div>}
                                                                                        {ev.score_accuracy && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">정확도</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_accuracy}</span></div>}
                                                                                    </div>
                                                                                    {ev.notes && <p className="text-sm text-slate-400 mt-2 italic">"{ev.notes}"</p>}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                        {projs.length === 0 && <p className="text-slate-500 text-sm text-center py-4">등록된 프로젝트 없음</p>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {filteredDashData.length === 0 && <div className="bg-slate-800 rounded-xl border border-slate-700 p-8 text-center"><p className="text-slate-500">해당 분기에 데이터가 없습니다.</p></div>}
                                    </div>
                                );
                            })()}

                            {/* TAB: 프로젝트 템플릿 */}
                            {memberActiveTab === 'templates' && (
                                <div className="space-y-6">
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-lg font-bold text-white flex items-center gap-2"><Bookmark size={18} className="text-blue-400" /> 프로젝트 템플릿</h3>
                                        </div>
                                        <p className="text-sm text-slate-400 mb-4">자주 사용하는 프로젝트 정보를 템플릿으로 저장해두고, 새 분기 작성 시 빠르게 불러올 수 있습니다. 프로젝트 작성 화면에서 각 프로젝트 우측 하단의 '템플릿 저장' 버튼으로도 추가할 수 있습니다.</p>

                                        {projectTemplates.length === 0 ? (
                                            <div className="text-center py-12 border-2 border-dashed border-slate-700 rounded-xl">
                                                <Bookmark size={36} className="mx-auto mb-3 text-slate-600" />
                                                <p className="text-slate-500 mb-1">저장된 템플릿이 없습니다</p>
                                                <p className="text-xs text-slate-600">프로젝트 작성 시 '템플릿 저장' 버튼을 이용해주세요</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {projectTemplates.map((tpl) => (
                                                    <div key={tpl.id} className="bg-slate-700/40 rounded-xl p-4 group hover:bg-slate-700/60 transition">
                                                        <div className="flex items-start justify-between">
                                                            <div className="flex-1">
                                                                <p className="text-white font-bold">{tpl.name}</p>
                                                                <div className="flex flex-wrap gap-2 mt-1.5">
                                                                    {tpl.project.role && <span className="text-[10px] px-1.5 py-0.5 bg-slate-600 text-slate-300 rounded">{tpl.project.role}</span>}
                                                                    {tpl.project.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/50 text-blue-300 rounded">{tpl.project.contribution}</span>}
                                                                    {tpl.project.opsStatus && <span className="text-[10px] px-1.5 py-0.5 bg-amber-900/50 text-amber-300 rounded">{tpl.project.opsStatus}</span>}
                                                                </div>
                                                                {tpl.project.kpi && <p className="text-xs text-slate-400 mt-1">KPI: {tpl.project.kpi}</p>}
                                                                {tpl.project.notes && <p className="text-xs text-slate-500 mt-1 line-clamp-2">{tpl.project.notes}</p>}
                                                                <p className="text-[10px] text-slate-600 mt-2">저장일: {new Date(tpl.createdAt).toLocaleDateString('ko-KR')}</p>
                                                            </div>
                                                            <div className="flex gap-2 ml-4 opacity-0 group-hover:opacity-100 transition">
                                                                <button onClick={() => deleteTemplate(tpl.id)} className="p-2 text-slate-400 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition" title="삭제">
                                                                    <Trash2 size={14} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Quick info */}
                                    <div className="bg-blue-900/20 border border-blue-800/30 rounded-xl p-4">
                                        <p className="text-sm text-blue-300 font-medium">💡 템플릿 사용 방법</p>
                                        <p className="text-xs text-blue-400/70 mt-1">프로젝트 작성 화면에서 '템플릿에서 추가' 버튼을 클릭하면 저장된 템플릿을 한 번에 불러올 수 있습니다.</p>
                                    </div>
                                </div>
                            )}

                            {/* TAB: 업무 메모 */}
                            {memberActiveTab === 'memos' && (
                                <div className="pb-32">
                                    {/* Memo Grid */}
                                    {memberMemos.length === 0 ? (
                                        <div className="text-center py-20">
                                            <StickyNote size={44} className="mx-auto mb-4 text-slate-700" />
                                            <p className="text-slate-500 text-lg">아직 메모가 없습니다</p>
                                            <p className="text-slate-600 text-sm mt-1">아래에서 새 메모를 작성해보세요</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-3 gap-4">
                                            {memberMemos.map((memo) => (
                                                <div key={memo.id} className="bg-slate-800 rounded-xl border border-slate-700 p-5 flex flex-col group hover:border-slate-500 transition min-h-[180px]">
                                                    {memoEditId === memo.id ? (
                                                        <div className="flex flex-col flex-1">
                                                            <textarea value={memoEditText} onChange={e => setMemoEditText(e.target.value)} className="flex-1 bg-slate-700 rounded-lg p-3 text-sm text-white resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600" autoFocus />
                                                            <div className="flex justify-end gap-2 mt-3">
                                                                <button onClick={() => setMemoEditId(null)} className="px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg text-xs font-medium hover:bg-slate-600 transition">취소</button>
                                                                <button onClick={() => updateMemo(memo.id)} className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition">저장</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="flex items-start justify-between mb-2">
                                                                <p className="text-white font-bold text-base leading-snug flex-1">{memo.title || '메모'}</p>
                                                                <div className="flex gap-1 ml-2 opacity-0 group-hover:opacity-100 transition shrink-0">
                                                                    <button onClick={() => { setMemoEditId(memo.id); setMemoEditText(memo.text); }} className="p-1.5 text-slate-500 hover:text-blue-400 hover:bg-blue-900/30 rounded-lg transition" title="수정">
                                                                        <Edit size={14} />
                                                                    </button>
                                                                    <button onClick={() => deleteMemo(memo.id)} className="p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition" title="삭제">
                                                                        <Trash2 size={14} />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            <p className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap flex-1">{memo.text}</p>
                                                            <p className="text-xs text-slate-500 mt-3 pt-3 border-t border-slate-700/50">
                                                                {new Date(memo.createdAt).toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })}
                                                                {memo.updatedAt && <span className="text-amber-500/60 ml-2">· 수정됨</span>}
                                                            </p>
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Fixed Bottom Memo Input */}
                                    <div className="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 shadow-2xl z-50">
                                        <div className="max-w-5xl mx-auto px-4">
                                            {/* Expand toggle */}
                                            <div className="flex justify-center -mt-3">
                                                <button onClick={() => setMemoInputExpanded(prev => !prev)} className="px-3 py-1 bg-slate-700 border border-slate-600 rounded-t-lg text-slate-400 hover:text-white transition text-xs flex items-center gap-1">
                                                    <ChevronUp size={14} style={{ transform: memoInputExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }} />
                                                    {memoInputExpanded ? '접기' : '넓게 작성'}
                                                </button>
                                            </div>
                                            <div className="py-3">
                                                {memoInputExpanded ? (
                                                    <div className="space-y-2">
                                                        <input value={memoNewTitle} onChange={e => setMemoNewTitle(e.target.value)} placeholder="메모 제목 (선택)" className="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                                        <textarea value={memoNewText} onChange={e => setMemoNewText(e.target.value)} placeholder="메모 내용을 입력하세요..." rows={4} className="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" />
                                                        <div className="flex justify-end">
                                                            <button onClick={() => { addMemo(); setMemoInputExpanded(false); }} disabled={!memoNewText.trim() && !memoNewTitle.trim()} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1.5 text-sm">
                                                                <Plus size={16} /> 메모 추가
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex gap-3 items-center">
                                                        <input value={memoNewTitle} onChange={e => setMemoNewTitle(e.target.value)} placeholder="제목 (선택)" className="w-44 px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 shrink-0" />
                                                        <input value={memoNewText} onChange={e => setMemoNewText(e.target.value)} placeholder="메모 내용을 입력하세요..."
                                                            className="flex-1 px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            onKeyDown={e => { if (e.key === 'Enter' && (memoNewText.trim() || memoNewTitle.trim())) { e.preventDefault(); addMemo(); } }} />
                                                        <button onClick={addMemo} disabled={!memoNewText.trim() && !memoNewTitle.trim()} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1.5 text-sm shrink-0">
                                                            <Plus size={16} /> 추가
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // MEMBER WRITE
            if (mode === 'member-write') {
                const jsonUploadRef = React.createRef();
                const readOnly = isSubmitted && !isEditMode;

                const goBackToMemberHome = async () => {
                    if (dbConnected && currentUser?.employee_id) {
                        const periods = await SupabaseAPI.getReviewPeriodsForEmployee(currentUser.employee_id);
                        setMyReviewPeriods(periods);
                    }
                    setMode('member-home');
                };

                return (
                    <div className="min-h-screen bg-slate-900 pb-32">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={goBackToMemberHome} className="flex items-center gap-2 text-slate-300 hover:text-white transition font-medium">
                                    <ChevronLeft size={18} /> 돌아가기
                                </button>
                                <div className="flex items-center gap-2">
                                    {isEditMode && (
                                        <>
                                            <button onClick={() => downloadJSON({...employeeData, period}, generateFilename({...employeeData, period}, false))} className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg hover:bg-slate-600 transition text-xs font-medium" title="JSON 다운로드">
                                                <DownloadImage size={14} /> JSON
                                            </button>
                                            <label className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg hover:bg-slate-600 transition text-xs font-medium cursor-pointer" title="JSON 불러오기">
                                                <Upload size={14} /> JSON
                                                <input ref={jsonUploadRef} type="file" accept=".json" className="hidden" onChange={handleEmployeeFileUpload} />
                                            </label>
                                        </>
                                    )}
                                    {isSubmitted && !isEditMode && (
                                        <button onClick={() => setIsEditMode(true)} className="flex items-center gap-1 px-3 py-1.5 bg-amber-500/20 text-amber-400 rounded-lg hover:bg-amber-500/30 transition text-xs font-bold">
                                            수정하기
                                        </button>
                                    )}
                                    <span className="text-sm text-slate-300 ml-2">{currentUser?.name}님</span>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-5xl mx-auto px-4 py-8">
                            {readOnly && (
                                <div className="bg-blue-900/30 border border-blue-700/50 rounded-xl p-4 mb-6 flex items-center justify-between">
                                    <div className="flex items-center gap-2 text-blue-300 text-sm font-medium">
                                        <CheckCircle size={18} />
                                        <span>이 리포트는 제출 완료 상태입니다. 수정하려면 우측 상단의 '수정하기' 버튼을 눌러주세요.</span>
                                    </div>
                                </div>
                            )}

                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-8 mb-8">
                                <h2 className="text-2xl font-bold text-white mb-6">프로젝트 회고 - {period.year} {period.quarter}</h2>

                                <div className="grid grid-cols-3 gap-4 mb-8">
                                    <InputField label="성명" value={employeeData.name} onChange={(e) => setEmployeeData({...employeeData, name: e.target.value})} placeholder="이름" readOnly={true} />
                                    <InputField label="사번" value={employeeData.empId} onChange={(e) => setEmployeeData({...employeeData, empId: e.target.value})} placeholder="사번" readOnly={true} />
                                    <InputField label="부서" value={employeeData.dept} onChange={(e) => setEmployeeData({...employeeData, dept: e.target.value})} placeholder="부서" readOnly={readOnly} />
                                </div>

                                <div className="space-y-6">
                                    {employeeData.projects.map((project, idx) => (
                                        <ProjectCard
                                            key={project.id}
                                            project={project}
                                            index={idx}
                                            isLeader={readOnly}
                                            showLeaderFeedback={false}
                                            onTriggerDelete={confirmRemoveProject}
                                            onUpdate={updateProject}
                                            onSaveTemplate={!readOnly ? async (proj) => {
                                                await saveAsTemplate(proj, proj.name);
                                                setModal({ isOpen: true, title: '템플릿 저장 완료', message: `"${proj.name}" 프로젝트가 템플릿으로 저장되었습니다.`, type: 'success', action: closeModal });
                                            } : undefined}
                                        />
                                    ))}

                                    {!readOnly && (
                                        <div className="flex gap-3">
                                            <button onClick={addNewProject} className="flex-1 py-4 border-2 border-dashed border-slate-600 rounded-2xl text-slate-400 font-bold hover:border-blue-500 hover:text-blue-400 hover:bg-slate-700/50 transition flex items-center justify-center gap-2">
                                                <Plus size={20} /> 프로젝트 추가
                                            </button>
                                            {projectTemplates.length > 0 && (
                                                <button onClick={() => setTemplatePickerOpen(true)} className="py-4 px-6 border-2 border-dashed border-blue-700 rounded-2xl text-blue-400 font-bold hover:border-blue-500 hover:bg-blue-900/30 transition flex items-center justify-center gap-2">
                                                    <Bookmark size={18} /> 템플릿에서 추가
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <AdditionalInfoSection data={employeeData} onChange={updateAdditionalInfo} isLeader={readOnly} />

                                {!readOnly && (
                                    <div className="mt-8">
                                        <div className="flex gap-3 mb-3">
                                            <button onClick={saveDraft} className="w-1/4 py-3 bg-slate-600 text-slate-200 rounded-lg font-bold hover:bg-slate-500 transition flex items-center justify-center gap-2 text-sm">
                                                <Save size={16} /> 임시 저장
                                            </button>
                                            <button onClick={loadDraftList} className="w-1/4 py-3 bg-slate-700 text-slate-200 rounded-lg font-bold hover:bg-slate-600 transition flex items-center justify-center gap-2 text-sm">
                                                <Upload size={16} /> 불러오기
                                            </button>
                                            <button onClick={submitEmployeeProjects} disabled={isSaving} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-50 flex items-center justify-center gap-2">
                                                <CheckCircle size={18} /> {isSaving ? '제출 중...' : '제출하기'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 템플릿 선택 모달 */}
                        {templatePickerOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" onClick={() => setTemplatePickerOpen(false)}>
                                <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-lg w-full border border-slate-700 overflow-hidden" onClick={e => e.stopPropagation()}>
                                    <div className="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-white flex items-center gap-2"><Bookmark size={18} className="text-blue-400" /> 템플릿에서 추가</h3>
                                        <button onClick={() => setTemplatePickerOpen(false)} className="p-1 text-slate-400 hover:text-white transition"><X size={20} /></button>
                                    </div>
                                    <div className="p-4 space-y-2 max-h-[60vh] overflow-y-auto">
                                        {projectTemplates.length === 0 ? (
                                            <p className="text-center text-slate-500 py-8">저장된 템플릿이 없습니다.</p>
                                        ) : projectTemplates.map(tpl => (

                                </div>

                                {loginError && (
                                    <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
                                        <AlertCircle size={16} />
                                        {loginError}
                                    </div>
                                )}

                                <button onClick={handleLogin} className="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
                                    로그인 <ChevronRight size={18} />
                                </button>

                                <p className="text-center text-xs text-slate-400 mt-4">© 2026 CHEONGAM. All rights reserved.</p>
                            </div>
                        </div>
                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // PASSWORD CHANGE SCREEN
            if (mode === 'change-password') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full">
                            <div className="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-amber-500/30">
                                <AlertCircle size={28} />
                            </div>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">비밀번호 변경 필요</h1>
                            <p className="text-center text-slate-400 text-sm mb-8">처음 로그인입니다. 새로운 비밀번호를 설정해주세요.</p>

                            <div className="space-y-4">
                                <InputField label="현재 비밀번호" type="password" value={currentPw} onChange={(e) => setCurrentPw(e.target.value)} placeholder="현재 비밀번호" />
                                <InputField label="새 비밀번호" type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="새 비밀번호" />
                                <InputField label="비밀번호 확인" type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} placeholder="새 비밀번호 확인" />

                                {pwChangeError && (
                                    <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 flex items-center gap-2">
                                        <AlertCircle size={16} />
                                        {pwChangeError}
                                    </div>
                                )}

                                <button onClick={handlePasswordChange} className="w-full py-3 bg-amber-600 text-white rounded-lg font-bold hover:bg-amber-700 transition">
                                    비밀번호 변경
                                </button>
                            </div>
                        </div>
                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // MEMBER HOME
            if (mode === 'member-home') {
                const availableQuarters = getAvailableQuarters();
                const writableQuarters = availableQuarters.filter(q => {
                    return !myReviewPeriods.some(p => p.year === q.year && p.quarter === q.quarter);
                });

                return (
                    <div className="min-h-screen bg-slate-900 pb-20">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                                <h1 className="text-xl font-bold text-white">Project Canvas</h1>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm text-slate-300">{currentUser?.name}님</span>
                                    <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-700 text-slate-100 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        <LogOut size={16} /> 로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-5xl mx-auto px-4 py-8">
                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-8 mb-8">
                                <h2 className="text-2xl font-bold text-white mb-2">내 프로젝트 캔버스</h2>
                                <p className="text-slate-400 mb-6">안녕하세요, {currentUser?.name}님</p>

                                {writableQuarters.length > 0 ? (
                                    <div className="flex flex-wrap gap-3">
                                        {writableQuarters.map(q => (
                                            <button key={`${q.year}-${q.quarter}`} onClick={() => startMemberWrite(q)} className="px-6 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition flex items-center gap-2">
                                                <Plus size={20} /> {q.year}년 {q.quarter} 작성하기
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="px-4 py-3 bg-slate-700/50 rounded-lg border border-slate-600 text-sm text-slate-400">
                                        <CheckCircle size={16} className="inline mr-1.5 text-green-500" />
                                        이번 분기 작성이 완료되었습니다.
                                    </div>
                                )}
                            </div>

                            <div className="space-y-4">
                                <h3 className="text-lg font-bold text-white mb-4">작성 이력</h3>
                                {myReviewPeriods.length === 0 ? (
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6 text-center">
                                        <FileText size={32} className="mx-auto mb-4 text-slate-600" />
                                        <p className="text-slate-400">아직 작성한 항목이 없습니다.</p>
                                    </div>
                                ) : (
                                    myReviewPeriods.map((pd) => (
                                        <button key={pd.id} onClick={() => loadExistingPeriod(pd.id)} className="w-full bg-slate-800 rounded-xl border border-slate-700 p-4 flex items-center justify-between hover:border-slate-500 transition text-left group cursor-pointer">
                                            <div>
                                                <p className="font-bold text-white group-hover:text-blue-400 transition">{pd.year} {pd.quarter}</p>
                                                <div className="flex flex-wrap gap-x-3 gap-y-0.5 mt-0.5">
                                                    <p className="text-xs text-slate-500">작성일: {new Date(pd.created_at).toLocaleDateString('ko-KR')}</p>
                                                    {pd.submitted_at && <p className="text-xs text-slate-500">제출: {new Date(pd.submitted_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                    {pd.updated_at && <p className="text-xs text-amber-400">수정: {new Date(pd.updated_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {pd.is_modified && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400">수정됨</span>}
                                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-blue-900/50 text-blue-400'}`}>
                                                    {pd.is_leader_reviewed ? '확인 완료' : '작성완료'}
                                                </span>
                                                <ChevronRight size={16} className="text-slate-500 group-hover:text-blue-400 transition" />
                                            </div>
                                        </button>
                                    ))
                                )}
                            </div>
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // MEMBER WRITE
            if (mode === 'member-write') {
                const jsonUploadRef = React.createRef();
                const readOnly = isSubmitted && !isEditMode;

                const goBackToMemberHome = async () => {
                    if (dbConnected && currentUser?.employee_id) {
                        const periods = await SupabaseAPI.getReviewPeriodsForEmployee(currentUser.employee_id);
                        setMyReviewPeriods(periods);
                    }
                    setMode('member-home');
                };

                return (
                    <div className="min-h-screen bg-slate-900 pb-32">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={goBackToMemberHome} className="flex items-center gap-2 text-slate-300 hover:text-white transition font-medium">
                                    <ChevronLeft size={18} /> 돌아가기
                                </button>
                                <div className="flex items-center gap-2">
                                    {isEditMode && (
                                        <>
                                            <button onClick={() => downloadJSON({...employeeData, period}, generateFilename({...employeeData, period}, false))} className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg hover:bg-slate-600 transition text-xs font-medium" title="JSON 다운로드">
                                                <DownloadImage size={14} /> JSON
                                            </button>
                                            <label className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg hover:bg-slate-600 transition text-xs font-medium cursor-pointer" title="JSON 불러오기">
                                                <Upload size={14} /> JSON
                                                <input ref={jsonUploadRef} type="file" accept=".json" className="hidden" onChange={handleEmployeeFileUpload} />
                                            </label>
                                        </>
                                    )}
                                    {isSubmitted && !isEditMode && (
                                        <button onClick={() => setIsEditMode(true)} className="flex items-center gap-1 px-3 py-1.5 bg-amber-500/20 text-amber-400 rounded-lg hover:bg-amber-500/30 transition text-xs font-bold">
                                            수정하기
                                        </button>
                                    )}
                                    <span className="text-sm text-slate-300 ml-2">{currentUser?.name}님</span>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-5xl mx-auto px-4 py-8">
                            {readOnly && (
                                <div className="bg-blue-900/30 border border-blue-700/50 rounded-xl p-4 mb-6 flex items-center justify-between">
                                    <div className="flex items-center gap-2 text-blue-300 text-sm font-medium">
                                        <CheckCircle size={18} />
                                        <span>이 리포트는 제출 완료 상태입니다. 수정하려면 우측 상단의 '수정하기' 버튼을 눌러주세요.</span>
                                    </div>
                                </div>
                            )}

                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-8 mb-8">
                                <h2 className="text-2xl font-bold text-white mb-6">프로젝트 회고 - {period.year} {period.quarter}</h2>

                                <div className="grid grid-cols-3 gap-4 mb-8">
                                    <InputField label="성명" value={employeeData.name} onChange={(e) => setEmployeeData({...employeeData, name: e.target.value})} placeholder="이름" readOnly={true} />
                                    <InputField label="사번" value={employeeData.empId} onChange={(e) => setEmployeeData({...employeeData, empId: e.target.value})} placeholder="사번" readOnly={true} />
                                    <InputField label="부서" value={employeeData.dept} onChange={(e) => setEmployeeData({...employeeData, dept: e.target.value})} placeholder="부서" readOnly={readOnly} />
                                </div>

                                <div className="space-y-6">
                                    {employeeData.projects.map((project, idx) => (
                                        <ProjectCard
                                            key={project.id}
                                            project={project}
                                            index={idx}
                                            isLeader={readOnly}
                                            onTriggerDelete={confirmRemoveProject}
                                            onUpdate={updateProject}
                                        />
                                    ))}

                                    {!readOnly && (
                                        <button onClick={addNewProject} className="w-full py-4 border-2 border-dashed border-slate-600 rounded-2xl text-slate-400 font-bold hover:border-blue-500 hover:text-blue-400 hover:bg-slate-700/50 transition flex items-center justify-center gap-2">
                                            <Plus size={20} /> 프로젝트 추가
                                        </button>
                                    )}
                                </div>

                                <AdditionalInfoSection data={employeeData} onChange={updateAdditionalInfo} isLeader={readOnly} />

                                {!readOnly && (
                                    <div className="mt-8">
                                        <div className="flex gap-3 mb-3">
                                            <button onClick={saveDraft} className="w-1/4 py-3 bg-slate-600 text-slate-200 rounded-lg font-bold hover:bg-slate-500 transition flex items-center justify-center gap-2 text-sm">
                                                <Save size={16} /> 임시 저장
                                            </button>
                                            <button onClick={loadDraftList} className="w-1/4 py-3 bg-slate-700 text-slate-200 rounded-lg font-bold hover:bg-slate-600 transition flex items-center justify-center gap-2 text-sm">
                                                <Upload size={16} /> 불러오기
                                            </button>
                                            <button onClick={submitEmployeeProjects} disabled={isSaving} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-50 flex items-center justify-center gap-2">
                                                <CheckCircle size={18} /> {isSaving ? '제출 중...' : '제출하기'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 임시 저장 불러오기 모달 */}
                        {draftModal.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-slate-800">임시 저장 목록</h3>
                                        <button onClick={() => setDraftModal({ isOpen: false, drafts: [] })} className="p-1 text-slate-400 hover:text-slate-700 transition">
                                            <X size={20} />
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1 p-4">
                                        {draftModal.drafts.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <FileText size={32} className="mx-auto mb-3 opacity-50" />
                                                <p>임시 저장된 데이터가 없습니다.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                {draftModal.drafts.map((draft) => {
                                                    const dt = new Date(draft.savedAt);
                                                    const dateStr = dt.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
                                                    const timeStr = dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                                    const projCount = draft.employeeData?.projects?.length || 0;
                                                    return (
                                                        <div key={draft.id} className="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-blue-300 transition group">
                                                            <button onClick={() => loadDraft(draft)} className="flex-1 text-left">
                                                                <p className="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">
                                                                    {draft.period?.year} {draft.period?.quarter}
                                                                </p>
                                                                <p className="text-xs text-slate-500 mt-0.5">
                                                                    {dateStr} {timeStr} · 프로젝트 {projCount}건
                                                                </p>
                                                            </button>
                                                            <button onClick={() => deleteDraft(draft.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition opacity-0 group-hover:opacity-100">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // LEADER HOME
            if (mode === 'leader-home') {
                return (
                    <div className="min-h-screen bg-slate-900">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <h1 className="text-2xl font-bold text-white">Project Canvas</h1>
                                <div className="flex items-center gap-4">
                                    <span className="text-slate-300">{currentUser?.name}님</span>
                                    <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-700 text-slate-100 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        <LogOut size={16} /> 로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-6xl mx-auto px-4 py-8">
                            <div className="flex gap-2 mb-8 border-b border-slate-700">
                                <button onClick={() => setLeaderActiveTab('employees')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'employees' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                    프로젝트
                                </button>
                                <button onClick={() => setLeaderActiveTab('myprojects')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'myprojects' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                    내 프로젝트
                                </button>
                                <button onClick={() => setLeaderActiveTab('dashboard')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'dashboard' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                    대시보드
                                </button>
                                {currentUser?.role === 'leader' && (
                                    <button onClick={() => setLeaderActiveTab('accounts')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'accounts' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        계정 관리
                                    </button>
                                )}
                            </div>

                            {leaderActiveTab === 'employees' && (
                                <div>
                                    <h2 className="text-xl font-bold text-white mb-6">제출된 프로젝트 현황</h2>
                                    {allReviewData.length === 0 ? (
                                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                            <FileText size={40} className="mx-auto mb-4 text-slate-600" />
                                            <p className="text-slate-400">제출된 프로젝트 데이터가 없습니다.</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {allReviewData.map(({ employee, periods }) => (
                                                <div key={employee.id} className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden hover:border-slate-500 transition">
                                                    <div className="p-5 border-b border-slate-700">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                                                                {employee.name?.charAt(0) || '?'}
                                                            </div>
                                                            <div>
                                                                <p className="text-white font-bold text-base">{employee.name}</p>
                                                                <p className="text-slate-400 text-xs">{employee.emp_id}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="p-4 space-y-2">
                                                        {periods.length === 0 ? (
                                                            <p className="text-slate-500 text-sm text-center py-3">작성된 항목 없음</p>
                                                        ) : (
                                                            periods.map((pd) => (
                                                                <div key={pd.id} className="group/card"
                                                                    onContextMenu={(e) => {
                                                                        if (currentUser?.role !== 'leader') return;
                                                                        e.preventDefault();
                                                                        setModal({
                                                                            isOpen: true, title: '데이터 삭제', type: 'danger',
                                                                            message: `${employee.name}의 ${pd.year} ${pd.quarter} 데이터를 삭제하시겠습니까?\n프로젝트, 리더 평가, 보상 데이터가 모두 삭제됩니다.`,
                                                                            action: async () => {
                                                                                try {
                                                                                    await SupabaseAPI.deleteReviewPeriod(pd.id);
                                                                                    const emps = await SupabaseAPI.getAllEmployees();
                                                                                    const reviews = await Promise.all(emps.map(async (emp) => {
                                                                                        const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                                                                                        return { employee: emp, periods };
                                                                                    }));
                                                                                    setAllReviewData(reviews);
                                                                                    closeModal();
                                                                                } catch (err) {
                                                                                    closeModal();
                                                                                    setModal({ isOpen: true, title: '삭제 실패', message: err.message, type: 'danger', action: closeModal });
                                                                                }
                                                                            }
                                                                        });
                                                                    }}
                                                                >
                                                                    <button onClick={() => loadEmployeeForLeader(employee.id, pd.id)} className="w-full p-3 bg-slate-700/60 hover:bg-slate-600 rounded-xl text-left transition">
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="text-slate-100 text-sm font-medium">{pd.year} {pd.quarter}</span>
                                                                            <div className="flex items-center gap-1">
                                                                                {pd.is_modified && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400">수정됨</span>}
                                                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-amber-900/50 text-amber-400'}`}>
                                                                                    {pd.is_leader_reviewed ? '검토완료' : '검토필요'}
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex flex-wrap gap-x-2 mt-1">
                                                                            {pd.submitted_at && <p className="text-slate-500 text-[10px]">제출: {new Date(pd.submitted_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                                            {pd.updated_at && <p className="text-amber-400 text-[10px]">수정: {new Date(pd.updated_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>}
                                                                            {!pd.submitted_at && <p className="text-slate-500 text-[10px]">{new Date(pd.created_at).toLocaleDateString('ko-KR')}</p>}
                                                                        </div>
                                                                    </button>
                                                                    {pd.is_leader_reviewed && (
                                                                        <button onClick={() => viewReportDirectly(employee.id, pd.id)} className="w-full mt-1 py-2 text-xs font-bold bg-green-900/40 text-green-400 hover:bg-green-800/60 rounded-xl transition flex items-center justify-center gap-1.5">
                                                                            <FileText size={14} /> 리포트 보기
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {leaderActiveTab === 'myprojects' && leaderMyView === 'list' && (() => {

                                                                            </div>
                                                                        </div>

                                                                    <td className="px-4 py-4 text-center">

                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                                    <div className="space-y-3">
                                                        {['S', 'A', 'B', 'C', 'D'].map(g => {
                                                            const count = dashboardData.filter(d => d.grade === g).length;
                                                            const pct = dashboardData.length > 0 ? (count / dashboardData.length * 100) : 0;
                                                            const colors = { S: 'bg-purple-500', A: 'bg-green-500', B: 'bg-blue-500', C: 'bg-amber-500', D: 'bg-red-500' };
                                                            return (
                                                                <div key={g} className="flex items-center gap-3">
                                                                    <span className="text-white font-black w-6 text-center">{g}</span>
                                                                    <div className="flex-1 bg-slate-700 rounded-full h-6 overflow-hidden">
                                                                        <div className={`h-full ${colors[g]} rounded-full transition-all duration-500 flex items-center justify-end pr-2`} style={{width: `${Math.max(pct, 2)}%`}}>
                                                                            {pct > 15 && <span className="text-white text-[10px] font-bold">{count}명</span>}
                                                                        </div>
                                                                    </div>
                                                                    <span className="text-slate-400 text-xs font-bold w-12 text-right">{count}명 ({pct.toFixed(0)}%)</span>
                                                                </div>

                                                            return (
                                                                <div key={lv} className="flex items-center gap-3">
                                                                    <span className="text-white font-bold w-6 text-center text-xs">{lv}</span>
                                                                    <div className="flex-1 bg-slate-700 rounded-full h-6 overflow-hidden">
                                                                        <div className="h-full bg-blue-500 rounded-full transition-all duration-500 flex items-center justify-end pr-2" style={{width: `${Math.max(pct, 2)}%`}}>
                                                                            {pct > 15 && <span className="text-white text-[10px] font-bold">{count}명</span>}
                                                                        </div>
                                                                    </div>
                                                                    <span className="text-slate-400 text-xs font-bold w-12 text-right">{count}명 ({pct.toFixed(0)}%)</span>
                                                                </div>
                                                            );
                                                        })}

                                                            const unsetCount = dashboardData.filter(d => d.level === '-').length;

                                                                <div className="flex items-center gap-3">
                                                                    <span className="text-slate-500 font-bold w-6 text-center text-xs">-</span>
                                                                    <div className="flex-1 bg-slate-700 rounded-full h-6 overflow-hidden">
                                                                        <div className="h-full bg-slate-600 rounded-full" style={{width: `${Math.max((unsetCount/dashboardData.length*100), 2)}%`}}></div>
                                                                    </div>
                                                                    <span className="text-slate-400 text-xs font-bold w-12 text-right">{unsetCount}명</span>
                                                                </div>

                                                        })()}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

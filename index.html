        // Password hashing function
        async function hashPassword(password) {
            const enc = new TextEncoder().encode(password);
            const hash = await crypto.subtle.digest('SHA-256', enc);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const SupabaseAPI = {
            isConnected: () => !!supabaseClient,

            async testConnection() {
                if (!supabaseClient) { console.warn('No supabase client'); return false; }
                try {
                    const { data, error } = await supabaseClient.from('employees').select('id').limit(1);
                    if (error) { console.warn('DB test error:', error.message); return false; }
                    console.log('DB connection OK');
                    return true;
                } catch(e) { console.warn('DB test exception:', e); return false; }
            },

            async loginUser(userId, passwordHash) {
                if (!supabaseClient) return null;
                const { data, error } = await supabaseClient.from('users').select('*').eq('user_id', userId).eq('password_hash', passwordHash).maybeSingle();
                if (error) { console.warn('Login error:', error); return null; }
                return data;
            },

            async updateUserPassword(userId, newPasswordHash) {
                if (!supabaseClient) throw new Error('No supabase client');
                const { error } = await supabaseClient.from('users').update({ password_hash: newPasswordHash, must_change_password: false }).eq('user_id', userId);
                if (error) throw error;
            },

            async getOrCreateEmployee(empData) {
                if (empData.empId) {
                    const { data } = await supabaseClient.from('employees').select('*').eq('emp_id', empData.empId).maybeSingle();
                    if (data) {
                        await supabaseClient.from('employees').update({
                            name: empData.name, dept: empData.dept, responsibilities: empData.responsibilities
                        }).eq('id', data.id);
                        return data.id;
                    }
                }
                const { data, error } = await supabaseClient.from('employees').insert({
                    name: empData.name, emp_id: empData.empId, dept: empData.dept, responsibilities: empData.responsibilities
                }).select().single();
                if (error) throw error;
                return data.id;
            },

            async getOrCreateReviewPeriod(employeeId, period) {
                const { data } = await supabaseClient.from('review_periods').select('*')
                    .eq('employee_id', employeeId).eq('year', period.year).eq('quarter', period.quarter).maybeSingle();
                if (data) return data.id;
                const { data: newData, error } = await supabaseClient.from('review_periods').insert({
                    employee_id: employeeId, year: period.year, quarter: period.quarter
                }).select().single();
                if (error) throw error;
                return newData.id;
            },

            async saveEmployeeData(employeeData, period, isSubmit = false) {
                const employeeId = await this.getOrCreateEmployee(employeeData);
                const reviewPeriodId = await this.getOrCreateReviewPeriod(employeeId, period);
                const updatePayload = {
                    next_goals: employeeData.nextGoals, improvements: employeeData.improvements
                };
                if (isSubmit) {
                    // Check if already submitted before (has submitted_at)
                    const { data: existing } = await supabaseClient.from('review_periods').select('submitted_at').eq('id', reviewPeriodId).maybeSingle();
                    if (existing && existing.submitted_at) {
                        updatePayload.updated_at = new Date().toISOString();
                        updatePayload.is_modified = true;
                    } else {
                        updatePayload.submitted_at = new Date().toISOString();
                        updatePayload.is_modified = false;
                    }
                }
                await supabaseClient.from('review_periods').update(updatePayload).eq('id', reviewPeriodId);
                await supabaseClient.from('projects').delete().eq('review_period_id', reviewPeriodId);
                if (employeeData.projects && employeeData.projects.length > 0) {
                    const rows = employeeData.projects.map((p, idx) => ({
                        review_period_id: reviewPeriodId, employee_id: employeeId, sort_order: idx,
                        name: p.name, plan_start: p.planStart || null, plan_end: p.planEnd || null,
                        act_start: p.actStart || null, act_end: p.actEnd || null, is_ongoing: p.isOngoing || false,
                        role: p.role, contribution: p.contribution, ops_status: p.opsStatus, kpi: p.kpi, notes: p.notes
                    }));
                    await supabaseClient.from('projects').insert(rows);
                }
                return { employeeId, reviewPeriodId };
            },

            async getEmployeeByUserId(userId) {
                const { data } = await supabaseClient.from('employees').select('*').eq('user_id', userId).maybeSingle();
                return data;
            },

            async getReviewPeriodsForEmployee(employeeId) {
                const { data } = await supabaseClient.from('review_periods').select('*')
                    .eq('employee_id', employeeId).order('year', { ascending: false }).order('quarter', { ascending: false });
                return data || [];
            },

            async loadEmployeeData(empId) {
                const { data: emp } = await supabaseClient.from('employees').select('*').eq('emp_id', empId).maybeSingle();
                if (!emp) return null;
                const { data: periods } = await supabaseClient.from('review_periods').select('*')
                    .eq('employee_id', emp.id).order('year', { ascending: false }).order('created_at', { ascending: false }).limit(1);
                if (!periods || periods.length === 0) return { employee: emp, period: null, projects: [], reviewPeriodId: null };
                const rp = periods[0];
                const { data: projects } = await supabaseClient.from('projects').select('*')
                    .eq('review_period_id', rp.id).order('sort_order', { ascending: true });
                return {
                    employee: emp, period: { year: rp.year, quarter: rp.quarter }, reviewPeriodId: rp.id,
                    nextGoals: rp.next_goals, improvements: rp.improvements,
                    projects: (projects || []).map(p => ({
                        id: p.id, name: p.name, planStart: p.plan_start || '', planEnd: p.plan_end || '',
                        actStart: p.act_start || '', actEnd: p.act_end || '', isOngoing: p.is_ongoing,
                        role: p.role || '', contribution: p.contribution || '', opsStatus: p.ops_status || '',
                        kpi: p.kpi || '', notes: p.notes || ''
                    }))
                };
            },

            async getAllEmployees() {
                const { data } = await supabaseClient.from('employees').select('*').order('name');
                // Cross-reference with users table to get correct names
                const { data: users } = await supabaseClient.from('users').select('user_id, name, employee_id');
                const userMap = {};
                (users || []).forEach(u => { if (u.employee_id) userMap[u.employee_id] = u; });
                return (data || []).map(emp => {
                    const linkedUser = userMap[emp.id];
                    return linkedUser ? { ...emp, name: linkedUser.name } : emp;
                });
            },

            async getAllUsers() {
                const { data } = await supabaseClient.from('users').select('*').order('name');
                return data || [];
            },

            async loadForLeaderReview(employeeId, reviewPeriodId) {
                const { data: emp } = await supabaseClient.from('employees').select('*').eq('id', employeeId).single();
                const { data: rp } = await supabaseClient.from('review_periods').select('*').eq('id', reviewPeriodId).single();
                const { data: projects } = await supabaseClient.from('projects').select('*')
                    .eq('review_period_id', reviewPeriodId).order('sort_order', { ascending: true });
                const { data: evals } = await supabaseClient.from('leader_evaluations').select('*').eq('review_period_id', reviewPeriodId);
                const { data: comp } = await supabaseClient.from('compensation').select('*').eq('review_period_id', reviewPeriodId).maybeSingle();
                // users 테이블에서 연봉 정보 가져오기
                const { data: userInfo } = await supabaseClient.from('users').select('salary, team').eq('employee_id', employeeId).maybeSingle();
                const userSalary = userInfo?.salary ? String(userInfo.salary) : '';
                const evalMap = {};
                if (evals) evals.forEach(ev => { evalMap[ev.project_id] = ev; });
                const mappedProjects = (projects || []).map(p => ({
                    id: p.id, name: p.name, planStart: p.plan_start || '', planEnd: p.plan_end || '',
                    actStart: p.act_start || '', actEnd: p.act_end || '', isOngoing: p.is_ongoing,
                    role: p.role || '', contribution: p.contribution || '', opsStatus: p.ops_status || '',
                    kpi: p.kpi || '', notes: p.notes || ''
                }));
                const leaderEval = {};
                mappedProjects.forEach((p, idx) => {
                    const ev = evalMap[p.id];
                    leaderEval[idx] = ev ? {
                        scoreSpeed: ev.score_speed || '', scoreQuality: ev.score_quality || '',
                        scoreComm: ev.score_comm || '', scoreAccuracy: ev.score_accuracy || '', notes: ev.notes || ''
                    } : { scoreSpeed: '', scoreQuality: '', scoreComm: '', scoreAccuracy: '', notes: '' };
                });
                const compData = comp ? {
                    currentLevel: comp.current_level || '', level: comp.confirmed_level || '',
                    currentSalary: comp.current_salary ? String(comp.current_salary) : userSalary,
                    salaryAmount: comp.salary_amount ? String(comp.salary_amount) : '',
                    incentiveAmount: comp.incentive_amount ? String(comp.incentive_amount) : '',
                    isIncentiveTarget: comp.is_incentive_target || false, isSalaryTarget: comp.is_salary_target || false,
                    strength: comp.strength || '', improvements: comp.improvements || '', levelOpinion: comp.level_opinion || ''
                } : { level: '', currentLevel: '', incentiveAmount: '', salaryAmount: '', currentSalary: userSalary,
                    strength: '', improvements: '', levelOpinion: '', isIncentiveTarget: false, isSalaryTarget: false };
                return {
                    employee: emp, period: rp ? { year: rp.year, quarter: rp.quarter } : null,
                    reviewPeriodId, nextGoals: rp?.next_goals || '', improvements: rp?.improvements || '',
                    isLeaderReviewed: rp?.is_leader_reviewed || false, projects: mappedProjects, leaderEval, compData
                };
            },

            async saveLeaderFeedback(reviewPeriodId, employeeId, projects, leaderEval, compData) {
                const { data: dbProjects } = await supabaseClient.from('projects').select('id, sort_order')
                    .eq('review_period_id', reviewPeriodId).order('sort_order', { ascending: true });
                if (dbProjects) {
                    for (let idx = 0; idx < dbProjects.length; idx++) {
                        const evalData = leaderEval[idx];
                        if (evalData) {
                            await supabaseClient.from('leader_evaluations').upsert({
                                project_id: dbProjects[idx].id, review_period_id: reviewPeriodId,
                                score_speed: evalData.scoreSpeed ? parseInt(evalData.scoreSpeed) : null,
                                score_quality: evalData.scoreQuality ? parseInt(evalData.scoreQuality) : null,
                                score_comm: evalData.scoreComm ? parseInt(evalData.scoreComm) : null,
                                score_accuracy: evalData.scoreAccuracy ? parseInt(evalData.scoreAccuracy) : null,
                                notes: evalData.notes || ''
                            }, { onConflict: 'project_id' });
                        }
                    }
                }
                await supabaseClient.from('compensation').upsert({
                    review_period_id: reviewPeriodId, employee_id: employeeId,
                    current_level: compData.currentLevel || null, confirmed_level: compData.level || null,
                    current_salary: compData.currentSalary ? parseInt(String(compData.currentSalary).replace(/,/g, '')) : null,
                    salary_amount: compData.salaryAmount ? parseInt(String(compData.salaryAmount).replace(/,/g, '')) : null,
                    incentive_amount: compData.incentiveAmount ? parseInt(String(compData.incentiveAmount).replace(/,/g, '')) : null,
                    is_incentive_target: compData.isIncentiveTarget || false, is_salary_target: compData.isSalaryTarget || false,
                    strength: compData.strength || '', improvements: compData.improvements || '', level_opinion: compData.levelOpinion || ''
                }, { onConflict: 'review_period_id' });
                await supabaseClient.from('review_periods').update({ is_leader_reviewed: true }).eq('id', reviewPeriodId);
            },

                    employee: emp, period: { year: rp.year, quarter: rp.quarter }, reviewPeriodId: rp.id,

                    projects: (projects || []).map(p => ({
                        id: p.id, name: p.name, planStart: p.plan_start || '', planEnd: p.plan_end || '',

                        role: p.role || '', contribution: p.contribution || '', opsStatus: p.ops_status || '',
                        kpi: p.kpi || '', notes: p.notes || ''
                    }))

            async deleteReviewPeriod(reviewPeriodId) {
                await supabaseClient.from('leader_evaluations').delete().eq('review_period_id', reviewPeriodId);
                await supabaseClient.from('compensation').delete().eq('review_period_id', reviewPeriodId);
                await supabaseClient.from('projects').delete().eq('review_period_id', reviewPeriodId);
                const { error } = await supabaseClient.from('review_periods').delete().eq('id', reviewPeriodId);
                if (error) throw error;
            },

            // ---- 카운트다운 API ----
            async getActiveCountdown() {
                const { data, error } = await supabaseClient.from('countdown_settings').select('*').eq('is_active', true).order('created_at', { ascending: false }).limit(1).maybeSingle();
                if (error) { console.error('getActiveCountdown error:', error); return null; }
                return data;

            async getAllCountdowns() {
                const { data, error } = await supabaseClient.from('countdown_settings').select('*').order('created_at', { ascending: false });

        const formatNumber = (num) => {
            if (!num) return '';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        const parseNumber = (str) => {
            if (!str) return 0;
            return parseInt(str.replace(/,/g, ''), 10) || 0;
        };

        const getAutoReviewPeriod = () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            let quarter;

            if (month >= 1 && month <= 3) quarter = '1분기';
            else if (month >= 2 && month <= 5) quarter = '2분기';
            else if (month >= 6 && month <= 9) quarter = '3분기';
            else quarter = '4분기';

            return { year, quarter };
        };

        const getAvailableQuarters = () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const quarters = [];
            if (month >= 1 && month <= 3) quarters.push({ year, quarter: '1분기' });
            if (month >= 2 && month <= 5) quarters.push({ year, quarter: '2분기' });
            if (month >= 6 && month <= 9) quarters.push({ year, quarter: '3분기' });
            if (month >= 9 && month <= 12) quarters.push({ year, quarter: '4분기' });
            return quarters;
        };

        const getDurationText = (start, end) => {
            if (!start || !end) return '';
            const s = new Date(start);
            const e = new Date(end);

            if (isNaN(s.getTime()) || isNaN(e.getTime())) return '';

            const diffTime = Math.abs(e - s);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return `(${diffDays}일)`;
        };

        const generateFilename = (data, isLeader) => {
            const now = new Date();
            const dateStr = now.toISOString().slice(0,10).replace(/-/g, "");

            const periodStr = data.period ? `${data.period.year}${data.period.quarter}` : 'Unknown';
            const typeStr = isLeader ? "리더 피드백 데이터" : "프로젝트 회고";

            return `${periodStr}_${dateStr}${timeStr}_${data.name}_${typeStr}.json`;
        };

        const getGrade = (score) => {
            const numScore = Number(score);
            if (numScore >= 9.0) return 'S';
            if (numScore >= 8.0) return 'A';
            return 'B-C';
        };

        const calculateAverage = (p) => {
            if (!p) return 0;
            const sum = Number(p.scoreSpeed || 0) + Number(p.scoreQuality || 0) + Number(p.scoreComm || 0) + Number(p.scoreAccuracy || 0);
            if (sum === 0) return 0;
            return (sum / 4).toFixed(1);
        };

        const calculateIncentiveScore = (projects, leaderEvals) => {
            if (!projects || projects.length === 0) return 0;

            let totalSpeed = 0;
            let totalQuality = 0;
            let validCount = 0;

            projects.forEach((p, idx) => {
                const evalData = leaderEvals[idx];
                if (evalData) {
                    const s = Number(evalData.scoreSpeed || 0);
                    const q = Number(evalData.scoreQuality || 0);
                    if (s > 0 || q > 0) {
                        totalSpeed += s;
                        totalQuality += q;
                        validCount++;
                    }
                }
            });

            if (validCount === 0) return 0;

            const avgSpeed = totalSpeed / validCount;
            const avgQuality = totalQuality / validCount;

            return ((avgSpeed * 0.6) + (avgQuality * 0.4)).toFixed(2);

                                    <th className="px-3 py-2 text-center text-[10px] font-bold text-slate-500 uppercase">역할</th>
                                    <th className="px-3 py-2 text-center text-[10px] font-bold text-slate-500 uppercase">기여도</th>
                                    <th className="px-3 py-2 text-center text-[10px] font-bold text-slate-500 uppercase">운영 반영</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-slate-100 text-xs">
                                {projects.map((proj, idx) => (
                                    <tr key={proj.id || idx} className="hover:bg-slate-50">
                                        <td className="px-3 py-2 font-medium text-slate-800">{proj.name}</td>
                                        <td className="px-3 py-2 text-center text-slate-500 tracking-tight">
                                            {proj.planStart} ~ {proj.planEnd}
                                            <span className="text-blue-600 font-bold ml-1">{getDurationText(proj.planStart, proj.planEnd)}</span>
                                        </td>
                                        <td className="px-3 py-2 text-center text-slate-600 font-medium tracking-tight bg-slate-50/50">
                                            {proj.actStart} ~ {proj.isOngoing ? '진행중' : proj.actEnd}
                                            <span className="text-blue-600 font-bold ml-1">
                                                {getDurationText(proj.actStart, proj.isOngoing ? new Date() : proj.actEnd)}
                                            </span>
                                        </td>
                                        <td className="px-3 py-2 text-center text-slate-600">{proj.role}</td>
                                        <td className="px-3 py-2 text-center">
                                            <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-blue-50 text-blue-700 border border-blue-100">
                                                {proj.contribution}
                                            </span>
                                        </td>
                                        <td className="px-3 py-2 text-center">
                                            <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium ${proj.opsStatus && proj.opsStatus.includes('완전') ? 'bg-green-50 text-green-700 border-green-100' : 'bg-gray-50 text-gray-600 border-gray-100'} border`}>
                                                {proj.opsStatus ? proj.opsStatus.split('(')[0] : '-'}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const CompensationCard = ({ overallScore, setCompData, compData, isPrint }) => {
            let grade = 'B-C';
            let rate = 0;
            let color = 'text-gray-500';

            if (overallScore >= 9.0) { grade = 'S'; rate = 30; color = 'text-purple-600'; }
            else if (overallScore >= 8.0) { grade = 'A'; rate = 20; color = 'text-green-600'; }

            useEffect(() => {
                if (compData.isIncentiveTarget) {
                    const val = String(compData.currentSalary || '').replace(/,/g, '');
                    if (!isNaN(val) && val !== '') {
                        const annualSalary = parseInt(val);
                        const monthlyBase = annualSalary / 12;
                        const incentive = Math.floor(monthlyBase * (rate / 100));

                        const formattedIncentive = incentive > 0 ? formatNumber(incentive) : '';
                        if (compData.incentiveAmount !== formattedIncentive) {
                            setCompData(prev => ({ ...prev, incentiveAmount: formattedIncentive }));
                        }
                    }
                } else {
                    if (compData.incentiveAmount !== '') {
                        setCompData(prev => ({ ...prev, incentiveAmount: '' }));
                    }
                }
            }, [compData.currentSalary, rate, setCompData, compData.isIncentiveTarget]);

            const handleCurrentSalaryChange = (e) => {
                const val = e.target.value.replace(/,/g, '');
                if (!isNaN(val) || val === '') {
                    setCompData(prev => ({ ...prev, currentSalary: val }));
                }
            };
            const handleConfirmedSalaryChange = (e) => {
                const val = e.target.value.replace(/,/g, '');
                if (!isNaN(val) || val === '') {
                    setCompData(prev => ({ ...prev, salaryAmount: val }));
                }
            };
            const handleIncentiveChange = (e) => {
                const val = e.target.value.replace(/,/g, '');
                if (!isNaN(val) || val === '') {
                    setCompData(prev => ({ ...prev, incentiveAmount: formatNumber(val) }));
                }
            };
            const handleFeedbackChange = (field, val) => setCompData(prev => ({ ...prev, [field]: val }));
            const toggleIncentiveTarget = (e) => setCompData(prev => ({ ...prev, isIncentiveTarget: e.target.checked }));
            const toggleSalaryTarget = (e) => setCompData(prev => ({ ...prev, isSalaryTarget: e.target.checked }));

            const currentSal = parseNumber(compData.currentSalary);
            const confirmedSal = parseNumber(compData.salaryAmount);
            const increaseRate = currentSal > 0 ? ((confirmedSal - currentSal) / currentSal * 100).toFixed(1) : 0;
            const increaseAmount = confirmedSal - currentSal;
            const selectedLevelInfo = SALARY_LEVELS.find(l => l.level === compData.level);

            return (
                <div className="bg-white rounded-2xl shadow-lg border border-slate-200 p-6 mb-8 mt-16 print-break print-hidden-bg print:shadow-none print:border-slate-300">
                      <div className="flex items-center gap-2 mb-6 border-b border-slate-100 pb-4">
                        <h2 className="text-xl font-bold text-slate-800">보상 및 레벨 피드백</h2>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8 mb-8">
                        <div className="flex-1 bg-slate-50 rounded-xl p-5 print-hidden-bg border border-slate-100">
                            <h3 className="text-sm font-bold text-slate-500 mb-4 flex items-center gap-2 justify-between">
                                <span className="flex items-center gap-2"><Target size={16}/> 성과 인센티브</span>
                                <label className="flex items-center gap-1 text-xs cursor-pointer text-blue-600">
                                    <input type="checkbox" checked={compData.isIncentiveTarget || false} onChange={toggleIncentiveTarget} className="accent-blue-600" />
                                    금번 지급 대상
                                </label>
                            </h3>
                            <div className="flex items-center justify-between bg-white p-4 rounded-lg border border-slate-200 mb-4">
                                <div>
                                    <p className="text-xs text-slate-400 uppercase font-bold">Final Grade</p>
                                    <p className={`text-3xl font-black ${color}`}>{grade} <span className="text-lg text-slate-400 font-normal">({overallScore})</span></p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-400 uppercase font-bold">Incentive Rate</p>
                                    <p className="text-xl font-bold text-slate-800">{rate}%</p>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 mb-1 block">현재 연봉 (원)</label>
                                    <input type="text" className="w-full border border-slate-300 rounded-lg px-3 capture-safe-input text-right font-bold text-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="0" value={formatNumber(compData.currentSalary)} onChange={handleCurrentSalaryChange}/>
                                    <p className="text-[10px] text-slate-400 mt-1 text-right">* 월 환산: {formatNumber(Math.floor(parseNumber(compData.currentSalary)/12))} 원</p>
                                </div>
                                <div>
                                    <label className={`text-xs font-bold mb-1 block ${!compData.isIncentiveTarget ? 'text-gray-400' : 'text-slate-500'}`}>제안 인센티브 (원)</label>
                                    <input type="text" className={`w-full border rounded-lg px-3 capture-safe-input text-right font-bold outline-none ${!compData.isIncentiveTarget ? 'bg-gray-100 text-gray-400 border-gray-200' : 'bg-blue-50 text-blue-800 border-blue-300 focus:ring-2 focus:ring-blue-500'}`} placeholder="0" value={compData.incentiveAmount || ''} onChange={handleIncentiveChange} disabled={!compData.isIncentiveTarget}/>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 bg-slate-50 rounded-xl p-5 print-hidden-bg border border-slate-100">
                             <h3 className="text-sm font-bold text-slate-500 mb-4 flex items-center gap-2 justify-between">
                                <span className="flex items-center gap-2"><Briefcase size={16}/> 연봉 및 레벨 조정</span>
                                <label className="flex items-center gap-1 text-xs cursor-pointer text-blue-600">
                                    <input type="checkbox" checked={compData.isSalaryTarget || false} onChange={toggleSalaryTarget} className="accent-blue-600" />
                                    금번 협상 대상
                                </label>
                            </h3>
                             <div className="grid grid-cols-2 gap-3 mb-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1.5">현재 등급</label>
                                    <select value={compData.currentLevel || ''} onChange={(e) => setCompData(prev => ({ ...prev, currentLevel: e.target.value }))} className="w-full border border-slate-300 rounded-lg px-3 capture-safe-input font-medium text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                                            <option value="">선택</option>
                                            {SALARY_LEVELS.map(l => <option key={l.level} value={l.level}>{l.level}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1.5">확정 등급</label>
                                    <select value={compData.level || ''} onChange={(e) => setCompData(prev => ({ ...prev, level: e.target.value }))} className="w-full border border-slate-300 rounded-lg px-3 capture-safe-input font-medium text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                                            <option value="">선택</option>
                                            {SALARY_LEVELS.map(l => <option key={l.level} value={l.level}>{l.level} - {l.desc}</option>)}
                                    </select>
                                </div>
                            </div>
                            {selectedLevelInfo && (
                                <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 mb-4">
                                    <p className="text-xs text-blue-600 font-bold mb-1">권장 연봉 구간</p>
                                    <p className="text-lg font-bold text-blue-800">{selectedLevelInfo.range}</p>
                                </div>
                            )}
                             <div className="space-y-4">
                                <div>
                                    <label className={`text-xs font-bold mb-1 block ${!compData.isSalaryTarget ? 'text-gray-400' : 'text-slate-500'}`}>제안 연봉 (원)</label>
                                    <input type="text" className={`w-full border rounded-lg px-3 capture-safe-input text-right font-bold outline-none ${!compData.isSalaryTarget ? 'bg-gray-100 text-gray-400 border-gray-200' : 'bg-white text-slate-800 border-slate-300 focus:ring-2 focus:ring-indigo-500'}`} placeholder="0" value={formatNumber(compData.salaryAmount)} onChange={handleConfirmedSalaryChange} disabled={!compData.isSalaryTarget}/>
                                </div>
                                <div className="flex justify-between items-center pt-2 border-t border-slate-200">
                                    <span className="text-xs font-bold text-slate-500">인상률</span>
                                    <span className={`text-sm font-bold ${increaseAmount > 0 ? 'text-red-500' : 'text-gray-500'}`}>
                                        {compData.isSalaryTarget && increaseRate != 0 ? `${increaseAmount > 0 ? '+' : ''}${formatNumber(increaseAmount)} (${increaseAmount > 0 ? '+' : ''}${increaseRate}%)` : '-'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6 border-t border-slate-100 pt-6">
                        <div>
                             <label className="flex items-center gap-2 text-sm font-bold text-blue-600 mb-2"><ThumbsUp size={16} /> 강점 및 긍정적 피드백</label>
                             <AutoResizeTextarea value={compData.strength || ''} onChange={(e) => handleFeedbackChange('strength', e.target.value)} placeholder="이번 분기 동안 보여준 강점이나 잘한 점에 대해 구체적으로 기술해주세요." className="bg-slate-50" />
                        </div>
                        <div>
                            <label className="flex items-center gap-2 text-sm font-bold text-amber-600 mb-2"><TrendingUp size={16} /> 개선 및 성장 제안</label>
                            <AutoResizeTextarea value={compData.improvements || ''} onChange={(e) => handleFeedbackChange('improvements', e.target.value)} placeholder="더 나은 성장을 위해 보완하거나 개선이 필요한 역량, 태도 등에 대해 기술해주세요." className="bg-slate-50" />
                        </div>
                        <div>
                            <label className="flex items-center gap-2 text-sm font-bold text-slate-600 mb-2"><MessageSquare size={16} /> 커리어 레벨에 대한 의견</label>
                            <AutoResizeTextarea value={compData.levelOpinion || ''} onChange={(e) => handleFeedbackChange('levelOpinion', e.target.value)} placeholder="현재 레벨 대비 수행 수준이나 다음 단계로 나아가기 위한 조언을 기술해주세요." className="bg-slate-50" />
                        </div>
                    </div>
                </div>
            );
        };

        const ProjectCard = ({ project, index, isLeader, showLeaderFeedback = true, onTriggerDelete, onUpdate, leaderEvalData, onUpdateLeaderEval, onSaveTemplate }) => {
            return (
                <div className="bg-white border border-slate-200 rounded-2xl p-6 mb-6 shadow-sm hover:shadow-md transition-shadow relative print-break group print-hidden-bg">

                    <div className="flex items-center gap-3 border-b border-slate-100 pb-4 mb-6">
                        <div className="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-bold text-sm print-hidden-bg relative">
                            {index + 1}
                        </div>
                        <h3 className="text-lg font-bold text-slate-800 flex-1">
                            {isLeader ? (project.name || '프로젝트명 미입력') : '프로젝트 상세 정보'}
                        </h3>
                        {!isLeader && (
                            <div className="flex items-center gap-1 ml-auto">
                                {onSaveTemplate && project.name && (
                                    <button
                                        type="button"
                                        onClick={(e) => { e.stopPropagation(); onSaveTemplate(project); }}
                                        className="no-print p-2 text-slate-400 hover:text-blue-500 hover:bg-blue-50 rounded-lg transition"
                                        title="템플릿으로 저장"
                                    >
                                        <Bookmark size={18} />
                                    </button>
                                )}
                                <button
                                    type="button"
                                    onClick={(e) => { e.stopPropagation(); onTriggerDelete(index); }}
                                    className="no-print p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"
                                    title="프로젝트 삭제"
                                >
                                    <Trash2 size={20} />
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-12 gap-x-6 gap-y-6">

                        {/* Row 1: 프로젝트명 + 기간(계획/실제 통합) */}
                        <div className="col-span-12 lg:col-span-4">
                            <InputField label="프로젝트명" value={project.name} onChange={(e) => onUpdate(index, 'name', e.target.value)} readOnly={isLeader} placeholder="예: 1분기 마케팅 캠페인 기획" />
                        </div>
                        <div className="col-span-12 lg:col-span-8">
                            <div className="flex flex-col w-full">
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5">
                                    <Calendar size={12}/> 프로젝트 기간
                                    {!isLeader && (
                                        <label className="flex items-center gap-1 cursor-pointer group/chk ml-auto no-print">
                                            <input type="checkbox" checked={project.isOngoing} onChange={(e) => onUpdate(index, 'isOngoing', e.target.checked)} className="accent-blue-600 w-3 h-3" />
                                            <span className="text-[10px] font-medium text-slate-500 group-hover/chk:text-blue-600 transition">현재 진행 중</span>
                                        </label>
                                    )}
                                </label>
                                <div className={`border border-slate-200 rounded-lg bg-white focus-within:ring-2 focus-within:ring-blue-500/20 focus-within:border-blue-500 transition-all ${isLeader ? 'bg-slate-50' : ''}`}>
                                    <div className="grid grid-cols-2 divide-x divide-slate-200">
                                        <div className="px-3 py-2">
                                            <p className="text-[10px] font-bold text-slate-400 mb-1 flex items-center gap-1">계획 기간 {(() => { const d = getDurationText(project.planStart, project.planEnd); return d ? <span className="text-blue-600 font-extrabold">{d}</span> : null; })()}</p>
                                            <div className="flex items-center gap-1">
                                                <input type="date" value={project.planStart} onChange={(e) => onUpdate(index, 'planStart', e.target.value)} readOnly={isLeader} className="flex-1 bg-transparent border-none outline-none text-xs text-slate-800 p-0 w-full" />
                                                <span className="text-slate-400 text-xs font-bold">~</span>
                                                <input type="date" value={project.planEnd} onChange={(e) => onUpdate(index, 'planEnd', e.target.value)} readOnly={isLeader} className="flex-1 bg-transparent border-none outline-none text-xs text-slate-800 p-0 w-full" />
                                            </div>
                                        </div>
                                        <div className="px-3 py-2">
                                            <p className="text-[10px] font-bold text-slate-400 mb-1 flex items-center gap-1">실제 수행 기간 {(() => { const ce = project.isOngoing ? new Date() : project.actEnd; const d = getDurationText(project.actStart, ce); return d ? <span className="text-blue-600 font-extrabold">{d}</span> : null; })()}</p>
                                            <div className="flex items-center gap-1">
                                                <input type="date" value={project.actStart} onChange={(e) => onUpdate(index, 'actStart', e.target.value)} readOnly={isLeader || project.isOngoing} className="flex-1 bg-transparent border-none outline-none text-xs text-slate-800 p-0 w-full" />
                                                <span className="text-slate-400 text-xs font-bold">~</span>
                                                {project.isOngoing ? (
                                                    <span className="flex-1 text-xs font-bold text-blue-600 text-center">진행중</span>
                                                ) : (
                                                    <input type="date" value={project.actEnd} onChange={(e) => onUpdate(index, 'actEnd', e.target.value)} readOnly={isLeader} className="flex-1 bg-transparent border-none outline-none text-xs text-slate-800 p-0 w-full" />
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Row 2: 담당역할 + 기여도 + 운영반영여부 */}
                        <div className="col-span-12 md:col-span-6 lg:col-span-4">
                            <InputField label="담당 역할" value={project.role} onChange={(e) => onUpdate(index, 'role', e.target.value)} readOnly={isLeader} placeholder="PM, 개발, 디자인 등" />
                        </div>
                        <div className="col-span-6 lg:col-span-4">
                            <SelectField label="기여도" value={project.contribution} onChange={(e) => onUpdate(index, 'contribution', e.target.value)} options={CONTRIBUTION_OPTIONS} disabled={isLeader} />
                        </div>
                        <div className="col-span-6 lg:col-span-4">
                             <SelectField label="운영 반영 여부" value={project.opsStatus} onChange={(e) => onUpdate(index, 'opsStatus', e.target.value)} options={OPS_STATUS_OPTIONS} disabled={isLeader} />
                        </div>

                        {/* Row 3: 핵심 성과(KPI) - full width, auto-resize */}
                        <div className="col-span-12">
                            <label className="text-xs font-bold text-slate-500 mb-1.5 block">핵심 성과(KPI)</label>
                            <AutoResizeTextarea
                                value={project.kpi}
                                onChange={(e) => onUpdate(index, 'kpi', e.target.value)}
                                readOnly={isLeader}
                                placeholder="예: 전환율 5% 달성, 매출 10% 증가 등 핵심 성과 지표를 기술하세요."
                            />
                        </div>

                        {/* Row 4: 업무 내용 - full width */}
                        <div className="col-span-12">
                            <label className="text-xs font-bold text-slate-500 mb-1.5 block">업무 내용</label>
                            <AutoResizeTextarea
                                value={project.notes}
                                onChange={(e) => onUpdate(index, 'notes', e.target.value)}
                                readOnly={isLeader}
                                placeholder="담당 업무 내용, 수행 중 특이사항이나 어려웠던 점, 배운 점 등을 자유롭게 기술하세요."
                            />
                        </div>

                    </div>

                    {isLeader && showLeaderFeedback && (
                        <div className="mt-8 border-t border-slate-100 pt-6 animate-fade-in">
                            <h4 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <div className="w-1.5 h-4 bg-red-500 rounded-full"></div>
                                리더 피드백
                            </h4>

                            <div className="flex flex-col xl:flex-row gap-6">
                                <div className="w-full xl:w-[280px] shrink-0">
                                    <ChartSection pData={project} lData={leaderEvalData} />
                                </div>

                                <div className="flex-1 space-y-4">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <SelectField label="속도 (Speed)" value={leaderEvalData?.scoreSpeed || ''} onChange={(e) => onUpdateLeaderEval(index, 'scoreSpeed', e.target.value)} options={SCORE_OPTIONS} className="bg-white" />
                                        <SelectField label="품질 (Quality)" value={leaderEvalData?.scoreQuality || ''} onChange={(e) => onUpdateLeaderEval(index, 'scoreQuality', e.target.value)} options={SCORE_OPTIONS} className="bg-white" />
                                        <SelectField label="소통 (Comm)" value={leaderEvalData?.scoreComm || ''} onChange={(e) => onUpdateLeaderEval(index, 'scoreComm', e.target.value)} options={SCORE_OPTIONS} className="bg-white" />
                                        <SelectField label="정확성 (Accuracy)" value={leaderEvalData?.scoreAccuracy || ''} onChange={(e) => onUpdateLeaderEval(index, 'scoreAccuracy', e.target.value)} options={SCORE_OPTIONS} className="bg-white" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1.5 block">리더 코멘트</label>
                                        <AutoResizeTextarea
                                            value={leaderEvalData?.notes}
                                            onChange={(e) => onUpdateLeaderEval(index, 'notes', e.target.value)}
                                            placeholder="피드백 및 조언을 작성해주세요."
                                            className="bg-white min-h-[100px]"
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AdditionalInfoSection = ({ data, onChange, isLeader }) => (
            <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6 print-break">
                <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm print-hidden-bg">
                    <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <Target size={20} className="text-blue-600"/>
                        차기 분기 업무 목표
                    </h3>
                    <AutoResizeTextarea
                        value={data.nextGoals || ''}
                        onChange={(e) => onChange('nextGoals', e.target.value)}
                        readOnly={isLeader}
                        className={`min-h-[150px] ${isLeader ? 'bg-slate-50 text-slate-600' : 'bg-white'}`}
                        placeholder="다음 분기에 달성하고자 하는 주요 목표와 계획을 서술하세요."
                    />
                </div>
                <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm print-hidden-bg">
                    <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <Lightbulb size={20} className="text-amber-500"/>
                        업무 프로세스 개선 제안
                    </h3>
                    <AutoResizeTextarea
                        value={data.improvements || ''}
                        onChange={(e) => onChange('improvements', e.target.value)}
                        readOnly={isLeader}
                        className={`min-h-[150px] ${isLeader ? 'bg-slate-50 text-slate-600' : 'bg-white'}`}
                        placeholder="업무 효율성 증대 및 팀 성장을 위한 개선 아이디어를 자유롭게 제안하세요."
                    />
                </div>
            </div>
        );

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [mode, setMode] = useState('login');

            const [loginId, setLoginId] = useState(() => {
                try { return localStorage.getItem('pc_last_login_id') || ''; } catch(e) { return ''; }
            });
            const [loginPw, setLoginPw] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newPw, setNewPw] = useState('');
            const [confirmPw, setConfirmPw] = useState('');
            const [currentPw, setCurrentPw] = useState('');
            const [pwChangeError, setPwChangeError] = useState('');

            const [employeeData, setEmployeeData] = useState({
                name: '', empId: '', dept: '', responsibilities: '',
                projects: [], nextGoals: '', improvements: ''
            });

            const [importedData, setImportedData] = useState(null);
            const [leaderEval, setLeaderEval] = useState({});
            const [compData, setCompData] = useState({
                level: '', currentLevel: '', incentiveAmount: '', salaryAmount: '', currentSalary: '',
                strength: '', improvements: '', levelOpinion: '', isIncentiveTarget: false, isSalaryTarget: false
            });

            const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'danger', action: null });
            const [period, setPeriod] = useState({ year: '', quarter: '' });

            const [dbConnected, setDbConnected] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [myReviewPeriods, setMyReviewPeriods] = useState([]);

            const [allReviewData, setAllReviewData] = useState([]);
            const [userAccounts, setUserAccounts] = useState([]);
            const [leaderActiveTab, setLeaderActiveTab] = useState('employees');
            const [selectedEmployeeId, setSelectedEmployeeId] = useState(null);
            const [reviewPeriodId, setReviewPeriodId] = useState(null);
            const [leaderMyPeriods, setLeaderMyPeriods] = useState([]);
            const [leaderMyView, setLeaderMyView] = useState('list'); // 'list' or 'write'
            const [assignModal, setAssignModal] = useState({ isOpen: false, adminUserId: null, adminName: '', assigned: [], employees: [] });
            const [dashboardQuarter, setDashboardQuarter] = useState(null);
            const [dashboardData, setDashboardData] = useState([]);
            const [dashboardYear, setDashboardYear] = useState(new Date().getFullYear());
            const [dashboardExpandedId, setDashboardExpandedId] = useState(null); // 팀 대시보드 아코디언
            const [dashboardExpandedProjects, setDashboardExpandedProjects] = useState([]); // 확장된 직원의 프로젝트 목록
            const [myDashExpandedProjId, setMyDashExpandedProjId] = useState(null); // 내 대시보드 프로젝트 아코디언
            const [reportExpandedProjIdx, setReportExpandedProjIdx] = useState(null); // 리포트 프로젝트 아코디언
            const [dashboardAutoLoaded, setDashboardAutoLoaded] = useState(false); // 자동 로드 여부
            const [projectViewMode, setProjectViewMode] = useState('card'); // 'card' or 'table'
            const [projectFilter, setProjectFilter] = useState('all'); // 'all' or '2025-4분기' etc.
            const [tableSortKey, setTableSortKey] = useState(null); // column key
            const [tableSortDir, setTableSortDir] = useState('asc'); // 'asc' or 'desc'

            // Member page tabs & features
            const [memberActiveTab, setMemberActiveTab] = useState('home'); // 'home', 'dashboard', 'templates', 'memos'
            const [memberMemos, setMemberMemos] = useState([]);
            const [memoEditId, setMemoEditId] = useState(null);
            const [memoEditText, setMemoEditText] = useState('');
            const [memoNewText, setMemoNewText] = useState('');
            const [memoNewTitle, setMemoNewTitle] = useState('');
            const [projectTemplates, setProjectTemplates] = useState([]);
            const [memberDashboardData, setMemberDashboardData] = useState(null);
            const [memberDashFilter, setMemberDashFilter] = useState('all');
            const [templatePickerOpen, setTemplatePickerOpen] = useState(false);
            const [memoInputExpanded, setMemoInputExpanded] = useState(false);
            const [leaderMyDashboard, setLeaderMyDashboard] = useState(false);
            const [leaderMyDashData, setLeaderMyDashData] = useState(null);
            const [leaderMyDashFilter, setLeaderMyDashFilter] = useState('all');

            // 카운트다운 관련 state
            const [countdownData, setCountdownData] = useState(null); // 활성 카운트다운 (DB)
            const [countdownRemaining, setCountdownRemaining] = useState(null); // { days, hours, minutes, seconds }
            const [countdownModal, setCountdownModal] = useState({ isOpen: false, title: '', date: '', time: '' });
            const [allCountdowns, setAllCountdowns] = useState([]);

            // 사용자별 메모/템플릿 DB에서 로드
            useEffect(() => {
                if (currentUser?.user_id && dbConnected) {
                    SupabaseAPI.getMemos(currentUser.user_id).then(data => {
                        setMemberMemos(data.map(m => ({ id: m.id, title: m.title, text: m.content, createdAt: m.created_at, updatedAt: m.updated_at })));
                    });
                    SupabaseAPI.getTemplates(currentUser.user_id).then(data => {
                        setProjectTemplates(data.map(t => ({ id: t.id, name: t.name, project: t.project_data, createdAt: t.created_at })));
                    });
                } else {
                    setMemberMemos([]);
                    setProjectTemplates([]);
                }
            }, [currentUser?.user_id, dbConnected]);

            // 카운트다운 DB에서 로드
            const loadCountdown = async () => {
                if (!dbConnected) return;
                const cd = await SupabaseAPI.getActiveCountdown();
                setCountdownData(cd);
            };

            useEffect(() => {
                if (dbConnected) loadCountdown();
            }, [dbConnected]);

            // 카운트다운 1초 타이머
            useEffect(() => {
                if (!countdownData || !countdownData.is_active) {
                    setCountdownRemaining(null);
                    return;
                }
                const tick = () => {
                    const now = new Date().getTime();
                    const deadline = new Date(countdownData.deadline).getTime();
                    const diff = deadline - now;
                    if (diff <= 0) {
                        setCountdownRemaining({ days: 0, hours: 0, minutes: 0, seconds: 0, expired: true });
                        return;
                    }
                    setCountdownRemaining({
                        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((diff % (1000 * 60)) / 1000),
                        expired: false
                    });
                };
                tick();
                const interval = setInterval(tick, 1000);
                return () => clearInterval(interval);
            }, [countdownData]);

            // 브라우저 뒤로가기 네비게이션 (SPA history)
            const pushHistory = (newMode, extra) => {
                const state = { mode: newMode, ...(extra || {}) };
                window.history.pushState(state, '', '');
            };

            useEffect(() => {
                const handlePopState = (e) => {
                    const state = e.state;
                    if (!state || !state.mode) {
                        // 기본: 로그인 상태면 홈으로
                        if (currentUser) {
                            if (currentUser.role === 'leader' || currentUser.role === 'admin') {
                                setMode('leader-home');
                            } else {
                                setMode('member-home');
                            }
                        }
                        return;
                    }
                    setMode(state.mode);
                    if (state.leaderActiveTab) setLeaderActiveTab(state.leaderActiveTab);
                    if (state.memberActiveTab) setMemberActiveTab(state.memberActiveTab);
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [currentUser]);

            // mode 변경 시 history에 push
            useEffect(() => {
                if (mode === 'login' || mode === 'change-password') return;
                // 현재 상태와 동일하면 push 하지 않음
                const currentState = window.history.state;
                if (currentState && currentState.mode === mode) return;
                pushHistory(mode, {
                    leaderActiveTab: leaderActiveTab,
                    memberActiveTab: memberActiveTab
                });
            }, [mode]);

            // 탭 변경 시 history push
            useEffect(() => {
                if (mode !== 'leader-home' && mode !== 'member-home') return;
                const currentState = window.history.state;
                const tabKey = mode === 'leader-home' ? 'leaderActiveTab' : 'memberActiveTab';
                const tabVal = mode === 'leader-home' ? leaderActiveTab : memberActiveTab;
                if (currentState && currentState.mode === mode && currentState[tabKey] === tabVal) return;
                pushHistory(mode, {
                    leaderActiveTab: leaderActiveTab,
                    memberActiveTab: memberActiveTab
                });
            }, [leaderActiveTab, memberActiveTab]);

            // Account management states
            const [newAccModal, setNewAccModal] = useState({ isOpen: false, name: '', userId: '', pw: '', role: 'member', team: '', salary: '' });
            const [editingAccId, setEditingAccId] = useState(null);
            const [editingAcc, setEditingAcc] = useState({ name: '', role: '', is_active: true, team: '', salary: '' });

            // Draft & edit states
            const [draftModal, setDraftModal] = useState({ isOpen: false, drafts: [] });
            const [isEditMode, setIsEditMode] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);

            // AI 면담 모달 state
            const [aiInterviewModal, setAiInterviewModal] = useState({ isOpen: false, data: null });

            useEffect(() => {
                SupabaseAPI.testConnection().then(ok => setDbConnected(ok));
            }, []);

            const closeModal = () => setModal({ ...modal, isOpen: false });

            const handleLogin = async () => {
                if (!loginId || !loginPw) {
                    setLoginError('아이디와 비밀번호를 입력해주세요.');
                    return;
                }
                try {
                    const hashedPw = await hashPassword(loginPw);
                    const user = await SupabaseAPI.loginUser(loginId, hashedPw);

                    if (!user) {
                        setLoginError('아이디 또는 비밀번호가 일치하지 않습니다.');
                        return;
                    }

                    if (!user.is_active) {
                        setLoginError('계정이 비활성화 상태입니다. 팀장에게 문의하세요.');
                        return;
                    }

                    setCurrentUser(user);
                    setLoginError('');
                    try { localStorage.setItem('pc_last_login_id', loginId); } catch(e) {}

                    if (user.must_change_password) {
                        setMode('change-password');
                    } else if (user.role === 'leader' || user.role === 'admin') {
                        setMode('leader-home');
                        if (dbConnected) {
                            if (user.role === 'admin') {
                                const { data: assignments } = await supabaseClient.from('admin_assignments').select('employee_id').eq('admin_user_id', user.user_id);
                                const assignedEmpIds = (assignments || []).map(a => a.employee_id);
                                if (assignedEmpIds.length > 0) {
                                    const { data: emps } = await supabaseClient.from('employees').select('*').in('id', assignedEmpIds);
                                    const reviews = await Promise.all((emps || []).map(async (emp) => {
                                        const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                                        return { employee: emp, periods };
                                    }));
                                    setAllReviewData(reviews);
                                }
                            } else {
                                const emps = await SupabaseAPI.getAllEmployees();
                                const reviews = await Promise.all(emps.map(async (emp) => {
                                    const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                                    return { employee: emp, periods };
                                }));
                                setAllReviewData(reviews);
                            }
                        }
                    } else {
                        setMode('member-home');
                        if (dbConnected && user.employee_id) {
                            const periods = await SupabaseAPI.getReviewPeriodsForEmployee(user.employee_id);
                            setMyReviewPeriods(periods);
                        }
                    }
                } catch (err) {
                    setLoginError('로그인 오류: ' + err.message);
                }
            };

            const handlePasswordChange = async () => {
                if (!currentPw || !newPw || !confirmPw) {
                    setPwChangeError('모든 필드를 입력해주세요.');
                    return;
                }
                if (newPw !== confirmPw) {
                    setPwChangeError('새 비밀번호가 일치하지 않습니다.');
                    return;
                }
                if (newPw.length < 4) {
                    setPwChangeError('비밀번호는 최소 4글자 이상이어야 합니다.');
                    return;
                }

                try {
                    const hashedCurrent = await hashPassword(currentPw);
                    if (hashedCurrent !== currentUser.password_hash) {
                        setPwChangeError('현재 비밀번호가 일치하지 않습니다.');
                        return;
                    }

                    const hashedNew = await hashPassword(newPw);
                    await SupabaseAPI.updateUserPassword(currentUser.user_id, hashedNew);

                    setModal({
                        isOpen: true,
                        title: '비밀번호 변경 완료',
                        message: '비밀번호가 성공적으로 변경되었습니다.',
                        type: 'success',
                        action: () => {
                            const updatedUser = { ...currentUser, must_change_password: false };
                            setCurrentUser(updatedUser);
                            if (currentUser.role === 'leader' || currentUser.role === 'admin') {
                                setMode('leader-home');
                            } else {
                                setMode('member-home');
                            }
                            closeModal();
                        }
                    });
                } catch (err) {
                    setPwChangeError('비밀번호 변경 실패: ' + err.message);
                }
            };

            // Load accounts on login (for team display) and when switching to accounts tab
            useEffect(() => {
                if ((currentUser?.role === 'leader' || currentUser?.role === 'admin') && dbConnected) {
                    supabaseClient.from('users').select('*').order('name').then(({ data }) => {
                        setUserAccounts(data || []);
                    });
                }
            }, [currentUser, dbConnected]);

            // Refresh accounts when switching to accounts tab
            useEffect(() => {
                if (leaderActiveTab === 'accounts' && currentUser?.role === 'leader') {
                    supabaseClient.from('users').select('*').order('name').then(({ data }) => {
                        setUserAccounts(data || []);
                    });
                }
            }, [leaderActiveTab]);

            // Refresh employee data when returning to leader-home or switching to employees tab
            useEffect(() => {
                if (mode === 'leader-home' && leaderActiveTab === 'employees' && (currentUser?.role === 'leader' || currentUser?.role === 'admin') && dbConnected) {
                    refreshAllReviewData();
                }
            }, [leaderActiveTab, mode]);

            // Load leader's own review periods when switching to myprojects tab
            useEffect(() => {
                if (leaderActiveTab === 'myprojects' && currentUser?.role === 'leader') {
                    setLeaderMyView('list');
                    const loadLeaderPeriods = async () => {
                        if (currentUser.employee_id) {
                            const periods = await SupabaseAPI.getReviewPeriodsForEmployee(currentUser.employee_id);
                            setLeaderMyPeriods(periods);
                        } else {
                            // employee가 아직 없으면 emp_id로 찾기
                            const { data: emp } = await supabaseClient.from('employees').select('id').eq('emp_id', currentUser.user_id).maybeSingle();
                            if (emp) {
                                const periods = await SupabaseAPI.getReviewPeriodsForEmployee(emp.id);
                                setLeaderMyPeriods(periods);
                            } else {
                                setLeaderMyPeriods([]);
                            }
                        }
                    };
                    loadLeaderPeriods();
                }
            }, [leaderActiveTab]);

            const handleLogout = () => {
                setCurrentUser(null);
                setMode('login');
                // loginId는 유지 (localStorage에서 복원)
                setLoginPw('');
                setLoginError('');
                setCurrentPw('');
                setNewPw('');
                setConfirmPw('');
                setPwChangeError('');
                setDashboardAutoLoaded(false);
                setDashboardQuarter(null);
                setDashboardData([]);
            };

            const downloadJSON = (data, filename) => {
                if(!data.name) {
                    setModal({ isOpen: true, title: '필수 정보 누락', message: '이름을 먼저 입력해주세요.', type: 'danger', action: closeModal });
                    return;
                }
                const periodStr = data.period ? `${data.period.year}${data.period.quarter}` : '';
                const now = new Date();
                const dateStr = now.toISOString().slice(0,10).replace(/-/g, "");
                const timeStr = now.toTimeString().slice(0,5).replace(":", "");
                const finalFilename = filename || `${periodStr}_${dateStr}${timeStr}_${data.name}_프로젝트 회고.json`;

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", finalFilename);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const addNewProject = () => {
                setEmployeeData(prev => ({
                    ...prev,
                    projects: [...prev.projects, {
                        id: Date.now(),
                        name: '', planStart: '', planEnd: '', actStart: '', actEnd: '', isOngoing: false,
                        role: '', contribution: '', opsStatus: '', kpi: '', notes: ''
                    }]
                }));
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
            };

            const confirmRemoveProject = (index) => {
                setModal({
                    isOpen: true, title: '프로젝트 삭제', message: '이 프로젝트를 정말 삭제하시겠습니까?', type: 'danger',
                    action: () => {
                        const newProjects = [...employeeData.projects];
                        newProjects.splice(index, 1);
                        setEmployeeData({...employeeData, projects: newProjects});
                        closeModal();
                    }
                });
            };

            const updateProject = (index, field, value) => {
                const newProjects = [...employeeData.projects];
                newProjects[index][field] = value;
                setEmployeeData({...employeeData, projects: newProjects});
            };

            const updateAdditionalInfo = (field, value) => setEmployeeData(prev => ({ ...prev, [field]: value }));

            const updateLeaderEval = (pIndex, field, value) => {
                setLeaderEval(prev => ({
                    ...prev,
                    [pIndex]: { ...prev[pIndex], [field]: value }
                }));
            };

            const saveEmployeeProjects = async () => {
                if (!employeeData.name || !employeeData.empId) {
                    setModal({ isOpen: true, title: '필수 정보 누락', message: '이름과 사번을 먼저 입력해주세요.', type: 'danger', action: closeModal });
                    return;
                }
                setIsSaving(true);
                try {
                    const result = await SupabaseAPI.saveEmployeeData({ ...employeeData, period }, period);
                    setReviewPeriodId(result.reviewPeriodId);
                    setModal({ isOpen: true, title: '저장 완료', message: 'DB에 성공적으로 저장되었습니다.', type: 'success', action: closeModal });
                } catch (err) {
                    setModal({ isOpen: true, title: '저장 실패', message: 'DB 오류: ' + err.message, type: 'danger', action: closeModal });
                }
                setIsSaving(false);
            };

            // ---- Member Memo helpers (DB) ----
            const addMemo = async () => {
                if (!memoNewText.trim() && !memoNewTitle.trim()) return;
                const title = memoNewTitle.trim() || '메모';
                const text = memoNewText.trim();
                const result = await SupabaseAPI.addMemo(currentUser.user_id, title, text);
                if (result) {
                    setMemberMemos(prev => [{ id: result.id, title: result.title, text: result.content, createdAt: result.created_at, updatedAt: result.updated_at }, ...prev]);
                }
                setMemoNewText(''); setMemoNewTitle('');
            };
            const updateMemo = async (id) => {
                await SupabaseAPI.updateMemo(id, memoEditText);
                setMemberMemos(prev => prev.map(m => m.id === id ? { ...m, text: memoEditText, updatedAt: new Date().toISOString() } : m));
                setMemoEditId(null); setMemoEditText('');
            };
            const deleteMemo = async (id) => {
                await SupabaseAPI.deleteMemo(id);
                setMemberMemos(prev => prev.filter(m => m.id !== id));
            };

            // ---- Project Template helpers (DB) ----
            const saveAsTemplate = async (project, templateName) => {
                const name = templateName || project.name || '템플릿';
                const projectData = { ...project, id: undefined, planStart: '', planEnd: '', actStart: '', actEnd: '' };
                const result = await SupabaseAPI.addTemplate(currentUser.user_id, name, projectData);
                if (result) {
                    setProjectTemplates(prev => [{ id: result.id, name: result.name, project: result.project_data, createdAt: result.created_at }, ...prev]);
                }
            };
            const deleteTemplate = async (id) => {
                await SupabaseAPI.deleteTemplate(id);
                setProjectTemplates(prev => prev.filter(t => t.id !== id));
            };
            const applyTemplate = (template) => {
                const newProj = { ...template.project, id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() };
                setEmployeeData(prev => ({ ...prev, projects: [...prev.projects, newProj] }));
            };

            // ---- Member Dashboard data loader ----
            const loadMemberDashboard = async () => {
                if (!dbConnected || !currentUser?.employee_id) return;
                try {
                    const periods = await SupabaseAPI.getReviewPeriodsForEmployee(currentUser.employee_id);
                    const periodDetails = await Promise.all(periods.map(async (pd) => {
                        const { data: projects } = await supabaseClient.from('projects').select('*').eq('review_period_id', pd.id).order('sort_order');
                        const { data: evals } = await supabaseClient.from('leader_evaluations').select('*').eq('review_period_id', pd.id);
                        return { period: pd, projects: projects || [], evals: evals || [] };
                    }));
                    setMemberDashboardData(periodDetails);
                } catch (err) { console.error('Dashboard load error:', err); }
            };

            const loadLeaderMyDashboard = async () => {
                if (!dbConnected || !currentUser?.employee_id) return;
                try {
                    const periods = await SupabaseAPI.getReviewPeriodsForEmployee(currentUser.employee_id);
                    const periodDetails = await Promise.all(periods.map(async (pd) => {
                        const { data: projects } = await supabaseClient.from('projects').select('*').eq('review_period_id', pd.id).order('sort_order');
                        const { data: evals } = await supabaseClient.from('leader_evaluations').select('*').eq('review_period_id', pd.id);
                        return { period: pd, projects: projects || [], evals: evals || [] };
                    }));
                    setLeaderMyDashData(periodDetails);
                } catch (err) { console.error('Leader my dashboard load error:', err); }
            };

            const startMemberWrite = (targetPeriod) => {
                const usePeriod = targetPeriod || getAutoReviewPeriod();
                setPeriod(usePeriod);
                setReviewPeriodId(null);
                setIsSubmitted(false);
                setIsEditMode(true);
                setEmployeeData({
                    name: currentUser.name || '',
                    empId: currentUser.user_id || '',

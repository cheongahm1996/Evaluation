                                            <button key={tpl.id} onClick={() => { applyTemplate(tpl); setTemplatePickerOpen(false); }} className="w-full text-left p-4 bg-slate-700/50 rounded-xl hover:bg-slate-700 border border-slate-600/50 hover:border-blue-500/50 transition group">
                                                <div className="flex items-center justify-between">
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-white font-bold group-hover:text-blue-400 transition">{tpl.name}</p>
                                                        <div className="flex flex-wrap gap-1.5 mt-1.5">
                                                            {tpl.project.role && <span className="text-[10px] px-1.5 py-0.5 bg-slate-600 text-slate-300 rounded">{tpl.project.role}</span>}
                                                            {tpl.project.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/50 text-blue-300 rounded">{tpl.project.contribution}</span>}
                                                            {tpl.project.opsStatus && <span className="text-[10px] px-1.5 py-0.5 bg-amber-900/50 text-amber-300 rounded">{tpl.project.opsStatus}</span>}
                                                        </div>
                                                        {tpl.project.kpi && <p className="text-xs text-slate-500 mt-1">KPI: {tpl.project.kpi}</p>}
                                                    </div>
                                                    <div className="ml-3 shrink-0 opacity-0 group-hover:opacity-100 transition">
                                                        <span className="text-xs font-bold text-blue-400 bg-blue-900/30 px-3 py-1.5 rounded-lg">추가</span>
                                                    </div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="px-6 py-3 border-t border-slate-700 bg-slate-800/50">
                                        <p className="text-[11px] text-slate-500">클릭하면 해당 프로젝트가 바로 추가됩니다. 날짜는 비워진 상태로 추가됩니다.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 임시 저장 불러오기 모달 */}
                        {draftModal.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-slate-800">임시 저장 목록</h3>
                                        <button onClick={() => setDraftModal({ isOpen: false, drafts: [] })} className="p-1 text-slate-400 hover:text-slate-700 transition">
                                            <X size={20} />
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1 p-4">
                                        {draftModal.drafts.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <FileText size={32} className="mx-auto mb-3 opacity-50" />
                                                <p>임시 저장된 데이터가 없습니다.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                {draftModal.drafts.map((draft) => {
                                                    const dt = new Date(draft.savedAt);
                                                    const dateStr = dt.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
                                                    const timeStr = dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                                    const projCount = draft.employeeData?.projects?.length || 0;
                                                    return (
                                                        <div key={draft.id} className="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-blue-300 transition group">
                                                            <button onClick={() => loadDraft(draft)} className="flex-1 text-left">
                                                                <p className="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">
                                                                    {draft.period?.year} {draft.period?.quarter}
                                                                </p>
                                                                <p className="text-xs text-slate-500 mt-0.5">
                                                                    {dateStr} {timeStr} · 프로젝트 {projCount}건
                                                                </p>
                                                            </button>
                                                            <button onClick={() => deleteDraft(draft.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition opacity-0 group-hover:opacity-100">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // LEADER HOME
            if (mode === 'leader-home') {
                return (
                    <div className="min-h-screen bg-slate-900">
                        <div className="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 shadow-lg">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <h1 className="text-2xl font-bold text-white">Project Canvas</h1>
                                <div className="flex items-center gap-4">
                                    <span className="text-slate-300">{currentUser?.name}님</span>
                                    <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-700 text-slate-100 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                                        <LogOut size={16} /> 로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-6xl mx-auto px-4 py-8">
                            <div className="flex items-center mb-8 border-b border-slate-700">
                                <div className="flex gap-2">
                                    <button onClick={() => setLeaderActiveTab('employees')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'employees' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        프로젝트
                                    </button>
                                    <button onClick={() => setLeaderActiveTab('myprojects')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'myprojects' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        내 프로젝트
                                    </button>
                                    <button onClick={() => setLeaderActiveTab('dashboard')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'dashboard' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        대시보드
                                    </button>
                                    <button onClick={() => setLeaderActiveTab('templates')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'templates' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        템플릿
                                    </button>
                                    <button onClick={() => setLeaderActiveTab('memos')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'memos' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                        메모
                                    </button>
                                    {currentUser?.role === 'leader' && (
                                        <button onClick={() => setLeaderActiveTab('accounts')} className={`px-6 py-3 font-bold border-b-2 transition ${leaderActiveTab === 'accounts' ? 'text-white border-b-blue-600' : 'text-slate-400 border-b-transparent hover:text-slate-200'}`}>
                                            계정 관리
                                        </button>
                                    )}
                                </div>
                                {countdownData && countdownData.is_active && countdownRemaining && (
                                    <div className="ml-auto flex-shrink-0 text-right px-4 py-1.5">
                                        <p className="text-[11px] font-bold text-amber-400 leading-tight">{countdownData.title}</p>
                                        {countdownRemaining.expired ? (
                                            <p className="text-xs font-bold text-red-400">마감됨</p>
                                        ) : (
                                            <p className="text-sm font-black text-white tabular-nums leading-tight">
                                                {countdownRemaining.days > 0 && <span>{countdownRemaining.days}<span className="text-[10px] font-medium text-slate-400">일 </span></span>}
                                                {String(countdownRemaining.hours).padStart(2,'0')}
                                                <span className="text-amber-400">:</span>
                                                {String(countdownRemaining.minutes).padStart(2,'0')}
                                                <span className="text-amber-400">:</span>
                                                {String(countdownRemaining.seconds).padStart(2,'0')}
                                            </p>
                                        )}
                                    </div>
                                )}
                            </div>

                            {leaderActiveTab === 'employees' && (() => {
                                // Collect all unique quarters for filter
                                const allQuarters = [];
                                allReviewData.forEach(({ periods }) => {
                                    periods.forEach(pd => {
                                        const key = `${pd.year}-${pd.quarter}`;
                                        if (!allQuarters.find(q => q.key === key)) {
                                            allQuarters.push({ key, year: pd.year, quarter: pd.quarter, label: `${pd.year} ${pd.quarter}` });
                                        }
                                    });
                                });
                                allQuarters.sort((a, b) => {
                                    if (a.year !== b.year) return String(b.year).localeCompare(String(a.year));
                                    return b.quarter.localeCompare(a.quarter);
                                });

                                // Filter data based on selected quarter
                                const filteredData = projectFilter === 'all' ? allReviewData : allReviewData.map(({ employee, periods }) => ({
                                    employee,
                                    periods: periods.filter(pd => `${pd.year}-${pd.quarter}` === projectFilter)
                                })).filter(({ periods }) => periods.length > 0);

                                // Build flat rows for table view
                                const buildTableRows = () => {
                                    const rows = [];
                                    filteredData.forEach(({ employee, periods }) => {
                                        periods.forEach(pd => {
                                            rows.push({ employee, pd, sortName: employee.name || '', sortQuarter: `${pd.year} ${pd.quarter}`, sortDate: pd.submitted_at || pd.created_at || '', sortStatus: pd.is_leader_reviewed ? '검토완료' : '검토필요' });
                                        });
                                    });
                                    if (tableSortKey) {
                                        rows.sort((a, b) => {
                                            let va, vb;
                                            if (tableSortKey === 'name') { va = a.sortName; vb = b.sortName; }
                                            else if (tableSortKey === 'quarter') { va = a.sortQuarter; vb = b.sortQuarter; }
                                            else if (tableSortKey === 'date') { va = a.sortDate; vb = b.sortDate; }
                                            else if (tableSortKey === 'status') { va = a.sortStatus; vb = b.sortStatus; }
                                            else { va = ''; vb = ''; }
                                            const cmp = String(va).localeCompare(String(vb), 'ko');
                                            return tableSortDir === 'asc' ? cmp : -cmp;
                                        });
                                    }
                                    return rows;
                                };

                                const handleSort = (key) => {
                                    if (tableSortKey === key) {
                                        setTableSortDir(prev => prev === 'asc' ? 'desc' : 'asc');
                                    } else {
                                        setTableSortKey(key);
                                        setTableSortDir('asc');
                                    }
                                };

                                const SortIcon = ({ col }) => {
                                    if (tableSortKey !== col) return <span className="text-slate-600 ml-1">↕</span>;
                                    return <span className="text-blue-400 ml-1">{tableSortDir === 'asc' ? '↑' : '↓'}</span>;
                                };

                                return (
                                <div>
                                    {/* Header Row */}
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="flex items-center gap-4">
                                            <h2 className="text-xl font-bold text-white">제출된 프로젝트 현황</h2>
                                            <div className="flex bg-slate-700 rounded-lg p-0.5">
                                                <button onClick={() => setProjectViewMode('card')} className={`p-2 rounded-md transition ${projectViewMode === 'card' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`} title="카드 보기">
                                                    <Grid3x3 size={16} />
                                                </button>
                                                <button onClick={() => setProjectViewMode('table')} className={`p-2 rounded-md transition ${projectViewMode === 'table' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`} title="테이블 보기">
                                                    <TableIcon size={16} />
                                                </button>
                                            </div>
                                        </div>
                                        {currentUser?.role === 'leader' && (
                                            <label className="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-teal-600 to-teal-500 text-white rounded-xl text-sm font-bold hover:from-teal-700 hover:to-teal-600 transition cursor-pointer shadow-lg shadow-teal-600/20">
                                                <Upload size={16} /> 과거 데이터 불러오기
                                                <input type="file" accept=".json" multiple className="hidden" onChange={importHistoricalData} />
                                            </label>
                                        )}
                                    </div>

                                    {/* Filter Bar */}
                                    {allQuarters.length > 0 && (
                                        <div className="flex items-center gap-2 mb-5 flex-wrap">
                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mr-1">필터</span>
                                            <button onClick={() => setProjectFilter('all')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${projectFilter === 'all' ? 'bg-blue-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                                전체
                                            </button>
                                            {allQuarters.map(q => (
                                                <button key={q.key} onClick={() => setProjectFilter(q.key)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${projectFilter === q.key ? 'bg-blue-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                                    {q.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {filteredData.length === 0 ? (
                                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                            <FileText size={40} className="mx-auto mb-4 text-slate-600" />
                                            <p className="text-slate-400">{projectFilter === 'all' ? '제출된 프로젝트 데이터가 없습니다.' : '해당 분기에 제출된 데이터가 없습니다.'}</p>
                                        </div>
                                    ) : projectViewMode === 'card' ? (
                                        (() => {
                                            // Build quarter-grouped cards
                                            const getEmployeeTeam = (empId) => {
                                                const u = userAccounts.find(acc => acc.employee_id === empId);
                                                return u?.team || '';
                                            };
                                            const teamColorClass = (team) => team === '플랫폼개발팀' ? 'bg-indigo-900/50 text-indigo-300 border-indigo-700/50' : team === '데이터전략팀' ? 'bg-emerald-900/50 text-emerald-300 border-emerald-700/50' : team === 'DX팀' ? 'bg-orange-900/50 text-orange-300 border-orange-700/50' : '';

                                            const renderEmployeeCard = (employee, periods) => {
                                                const empTeam = getEmployeeTeam(employee.id);
                                                return (
                                                <div key={employee.id} className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden hover:border-slate-500 transition">
                                                    <div className="p-5 border-b border-slate-700">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                                                                {employee.name?.charAt(0) || '?'}
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                <p className="text-white font-bold text-base">{employee.name}</p>
                                                                <p className="text-slate-400 text-xs">{employee.emp_id}</p>
                                                            </div>
                                                            {empTeam && <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${teamColorClass(empTeam)}`}>{empTeam}</span>}
                                                        </div>
                                                    </div>
                                                    <div className="p-4 space-y-2">
                                                        {periods.length === 0 ? (
                                                            <p className="text-slate-500 text-sm text-center py-3">작성된 항목 없음</p>
                                                        ) : (
                                                            periods.map((pd) => (
                                                                <div key={pd.id} className="group/card"
                                                                    onContextMenu={(e) => {
                                                                        if (currentUser?.role !== 'leader') return;
                                                                        e.preventDefault();
                                                                        setModal({
                                                                            isOpen: true, title: '데이터 삭제', type: 'danger',
                                                                            message: `${employee.name}의 ${pd.year} ${pd.quarter} 데이터를 삭제하시겠습니까?\n프로젝트, 리더 평가, 보상 데이터가 모두 삭제됩니다.`,
                                                                            action: async () => {
                                                                                try {
                                                                                    await SupabaseAPI.deleteReviewPeriod(pd.id);
                                                                                    await refreshAllReviewData();
                                                                                    closeModal();
                                                                                } catch (err) {
                                                                                    closeModal();
                                                                                    setModal({ isOpen: true, title: '삭제 실패', message: err.message, type: 'danger', action: closeModal });
                                                                                }
                                                                            }
                                                                        });
                                                                    }}
                                                                >
                                                                    <button onClick={() => loadEmployeeForLeader(employee.id, pd.id)} className="w-full p-3 bg-slate-700/60 hover:bg-slate-600 rounded-xl text-left transition">
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="text-slate-100 text-sm font-medium">{pd.year} {pd.quarter}</span>
                                                                            <div className="flex items-center gap-1">
                                                                                {pd.is_modified && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400">수정됨</span>}
                                                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-amber-900/50 text-amber-400'}`}>
                                                                                    {pd.is_leader_reviewed ? '검토완료' : '검토필요'}
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex flex-wrap gap-x-2 mt-1">

                                                const sortedByTeam = [...filteredData].sort((a, b) => {
                                                    const ta = getEmployeeTeam(a.employee.id) || '';
                                                    const tb = getEmployeeTeam(b.employee.id) || '';
                                                    const oa = teamOrder[ta] !== undefined ? teamOrder[ta] : 99;
                                                    const ob = teamOrder[tb] !== undefined ? teamOrder[tb] : 99;
                                                    if (oa !== ob) return oa - ob;
                                                    return (a.employee.name || '').localeCompare(b.employee.name || '', 'ko');

                                            const teamOrder2 = { '플랫폼개발팀': 0, '데이터전략팀': 1, 'DX팀': 2, '': 3 };

                                                    const ta = getEmployeeTeam(a.employee.id) || '';
                                                    const tb = getEmployeeTeam(b.employee.id) || '';
                                                    const oa = teamOrder2[ta] !== undefined ? teamOrder2[ta] : 99;
                                                    const ob = teamOrder2[tb] !== undefined ? teamOrder2[tb] : 99;

                                                                const reviewRate = ts.count > 0 ? Math.round((ts.reviewedCount / ts.count) * 100) : 0;

                                                                                <span className="text-white font-bold text-sm">{ts.avgScore !== '-' ? ts.avgScore + ' / 10' : '-'}</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-slate-400 text-xs">총 프로젝트</span>
                                                                                <span className="text-white font-bold text-sm">{ts.totalProjects}건</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-slate-400 text-xs">1인당 프로젝트</span>
                                                                                <span className="text-white font-bold text-sm">{projPerPerson}건</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-slate-400 text-xs">검토 완료율</span>
                                                                                <span className="text-white font-bold text-sm">{reviewRate}%</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                    </>)}

                                    {/* 내 대시보드 */}
                                    {leaderMyDashboard && (() => {
                                        if (!leaderMyDashData) return (
                                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                                <Activity size={40} className="mx-auto mb-4 text-slate-600 animate-pulse" />
                                                <p className="text-slate-400">데이터를 불러오는 중...</p>
                                            </div>
                                        );
                                        if (leaderMyDashData.length === 0) return (
                                            <div className="bg-slate-800 rounded-2xl border border-slate-700 p-12 text-center">
                                                <Activity size={40} className="mx-auto mb-4 text-slate-600" />
                                                <p className="text-slate-400">제출된 성과 데이터가 없습니다.</p>
                                            </div>
                                        );
                                        const dashQuarters = leaderMyDashData.map(d => `${d.period.year} ${d.period.quarter}`);
                                        const filteredData = leaderMyDashFilter === 'all' ? leaderMyDashData : leaderMyDashData.filter(d => `${d.period.year} ${d.period.quarter}` === leaderMyDashFilter);
                                        return (
                                            <div className="space-y-4">
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <button onClick={() => setLeaderMyDashFilter('all')} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${leaderMyDashFilter === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-white'}`}>전체</button>
                                                    {dashQuarters.map(q => (
                                                        <button key={q} onClick={() => setLeaderMyDashFilter(q)} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${leaderMyDashFilter === q ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-white'}`}>{q}</button>
                                                    ))}
                                                </div>
                                                {filteredData.map((item) => {
                                                    const pd = item.period;
                                                    const projs = item.projects;
                                                    const evals = item.evals;
                                                    const evalMap = {};
                                                    evals.forEach(ev => { evalMap[ev.project_id] = ev; });
                                                    let avgScore = null;
                                                    if (pd.is_leader_reviewed && evals.length > 0) {
                                                        let total = 0; let count = 0;
                                                        evals.forEach(ev => { [ev.score_speed, ev.score_quality, ev.score_comm, ev.score_accuracy].forEach(s => { if (s) { total += s; count++; } }); });
                                                        if (count > 0) avgScore = (total / count).toFixed(1);
                                                    }
                                                    return (
                                                        <div key={pd.id} className="bg-slate-800 rounded-xl border border-slate-700">
                                                            <div className="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-white font-bold">{pd.year} {pd.quarter}</span>
                                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${pd.is_leader_reviewed ? 'bg-green-900/50 text-green-400' : 'bg-amber-900/50 text-amber-400'}`}>
                                                                        {pd.is_leader_reviewed ? '검토완료' : '검토대기'}
                                                                    </span>
                                                                    <span className="text-xs text-slate-500">· {projs.length}건</span>
                                                                </div>
                                                                {avgScore && <span className="text-sm font-bold text-white">평균 <span className="text-blue-400">{avgScore}</span><span className="text-slate-500 text-xs"> / 10</span></span>}
                                                            </div>
                                                            <div className="divide-y divide-slate-700/50">
                                                                {projs.map((proj) => {
                                                                    const ev = evalMap[proj.id];
                                                                    const scores = ev ? [ev.score_speed, ev.score_quality, ev.score_comm, ev.score_accuracy].filter(Boolean) : [];
                                                                    const projAvg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : null;
                                                                    const isProjExpanded = myDashExpandedProjId === proj.id;
                                                                    return (
                                                                        <div key={proj.id}>
                                                                            <div onClick={() => setMyDashExpandedProjId(isProjExpanded ? null : proj.id)} className={`px-5 py-3 flex items-center gap-4 cursor-pointer hover:bg-slate-700/30 transition ${isProjExpanded ? 'bg-slate-700/30' : ''}`}>
                                                                                <div className="flex-1 min-w-0">
                                                                                    <div className="flex items-center gap-2">
                                                                                        <ChevronDown size={12} className={`text-slate-500 transition-transform duration-200 shrink-0 ${isProjExpanded ? 'rotate-180' : ''}`} />
                                                                                        <span className="text-slate-200 text-sm font-medium truncate">{proj.name || '(이름 없음)'}</span>
                                                                                        {proj.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/40 text-blue-300 rounded shrink-0">{proj.contribution}</span>}
                                                                                    </div>
                                                                                    <span className="text-[11px] text-slate-500 ml-5">{proj.act_start || '-'} ~ {proj.is_ongoing ? '진행중' : (proj.act_end || '-')}</span>
                                                                                </div>
                                                                                {projAvg ? (
                                                                                    <div className="flex items-center gap-2 shrink-0">
                                                                                        <div className="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                                                                            <div className="h-full rounded-full" style={{ width: `${(projAvg / 10) * 100}%`, backgroundColor: projAvg >= 8 ? '#22c55e' : projAvg >= 6 ? '#eab308' : '#ef4444' }}></div>
                                                                                        </div>
                                                                                        <span className="text-xs font-bold text-white w-6 text-right">{projAvg}</span>
                                                                                    </div>
                                                                                ) : (
                                                                                    <span className="text-[10px] text-slate-600 shrink-0">미평가</span>
                                                                                )}
                                                                            </div>
                                                                            {isProjExpanded && (
                                                                                <div className="bg-slate-900/50 px-6 py-4 border-t border-slate-700/30 animate-slideDown">
                                                                                    <div className="grid grid-cols-2 gap-x-6 gap-y-2.5 text-sm">
                                                                                        {proj.role && <div><span className="text-slate-500 text-xs">역할</span><p className="text-slate-200">{proj.role}</p></div>}
                                                                                        {proj.ops_status && <div><span className="text-slate-500 text-xs">운영 상태</span><p className="text-slate-200">{proj.ops_status}</p></div>}
                                                                                        {proj.kpi && <div className="col-span-2"><span className="text-slate-500 text-xs">KPI</span><p className="text-slate-200">{proj.kpi}</p></div>}
                                                                                        {proj.notes && <div className="col-span-2"><span className="text-slate-500 text-xs">비고</span><p className="text-slate-300">{proj.notes}</p></div>}
                                                                                    </div>
                                                                                    {ev && (
                                                                                        <div className="mt-3 pt-3 border-t border-slate-700/30">
                                                                                            <p className="text-xs text-slate-400 font-bold mb-2">리더 평가</p>
                                                                                            <div className="flex items-center gap-4 flex-wrap">
                                                                                                {ev.score_speed && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">속도</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_speed}</span></div>}
                                                                                                {ev.score_quality && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">품질</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_quality}</span></div>}
                                                                                                {ev.score_comm && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">소통</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_comm}</span></div>}
                                                                                                {ev.score_accuracy && <div className="flex items-center gap-1.5"><span className="text-xs text-slate-400">정확도</span><span className="text-sm font-bold text-white bg-slate-700/80 px-2.5 py-0.5 rounded-lg">{ev.score_accuracy}</span></div>}
                                                                                            </div>
                                                                                            {ev.notes && <p className="text-sm text-slate-400 mt-2 italic">"{ev.notes}"</p>}
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                                {projs.length === 0 && <p className="text-slate-500 text-sm text-center py-4">등록된 프로젝트 없음</p>}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                                {filteredData.length === 0 && <div className="bg-slate-800 rounded-xl border border-slate-700 p-8 text-center"><p className="text-slate-500">해당 분기에 데이터가 없습니다.</p></div>}
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}

                            {/* 리더 - 프로젝트 템플릿 */}
                            {leaderActiveTab === 'templates' && (
                                <div className="space-y-6">
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-lg font-bold text-white flex items-center gap-2"><Bookmark size={18} className="text-blue-400" /> 프로젝트 템플릿</h3>
                                        </div>
                                        <p className="text-sm text-slate-400 mb-4">자주 사용하는 프로젝트 정보를 템플릿으로 저장해두고, 새 분기 작성 시 빠르게 불러올 수 있습니다.</p>

                                        {projectTemplates.length === 0 ? (
                                            <div className="text-center py-12 border-2 border-dashed border-slate-700 rounded-xl">
                                                <Bookmark size={36} className="mx-auto mb-3 text-slate-600" />
                                                <p className="text-slate-500 mb-1">저장된 템플릿이 없습니다</p>
                                                <p className="text-xs text-slate-600">프로젝트 작성 시 '템플릿 저장' 버튼을 이용해주세요</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {projectTemplates.map((tpl) => (
                                                    <div key={tpl.id} className="bg-slate-700/40 rounded-xl p-4 group hover:bg-slate-700/60 transition">
                                                        <div className="flex items-start justify-between">
                                                            <div className="flex-1">
                                                                <p className="text-white font-bold">{tpl.name}</p>
                                                                <div className="flex flex-wrap gap-2 mt-1.5">
                                                                    {tpl.project.role && <span className="text-[10px] px-1.5 py-0.5 bg-slate-600 text-slate-300 rounded">{tpl.project.role}</span>}
                                                                    {tpl.project.contribution && <span className="text-[10px] px-1.5 py-0.5 bg-blue-900/50 text-blue-300 rounded">{tpl.project.contribution}</span>}
                                                                    {tpl.project.opsStatus && <span className="text-[10px] px-1.5 py-0.5 bg-amber-900/50 text-amber-300 rounded">{tpl.project.opsStatus}</span>}
                                                                </div>
                                                                {tpl.project.kpi && <p className="text-xs text-slate-400 mt-1">KPI: {tpl.project.kpi}</p>}
                                                                <p className="text-[10px] text-slate-600 mt-2">저장일: {new Date(tpl.createdAt).toLocaleDateString('ko-KR')}</p>
                                                            </div>
                                                            <button onClick={() => deleteTemplate(tpl.id)} className="p-2 text-slate-400 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition opacity-0 group-hover:opacity-100" title="삭제">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* 리더 - 업무 메모 */}
                            {leaderActiveTab === 'memos' && (
                                <div className="pb-32">
                                    {memberMemos.length === 0 ? (
                                        <div className="text-center py-20">
                                            <StickyNote size={44} className="mx-auto mb-4 text-slate-700" />
                                            <p className="text-slate-500 text-lg">아직 메모가 없습니다</p>
                                            <p className="text-slate-600 text-sm mt-1">아래에서 새 메모를 작성해보세요</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-3 gap-4">
                                            {memberMemos.map((memo) => (
                                                <div key={memo.id} className="bg-slate-800 rounded-xl border border-slate-700 p-5 flex flex-col group hover:border-slate-500 transition min-h-[180px]">
                                                    {memoEditId === memo.id ? (
                                                        <div className="flex flex-col flex-1">
                                                            <textarea value={memoEditText} onChange={e => setMemoEditText(e.target.value)} className="flex-1 bg-slate-700 rounded-lg p-3 text-sm text-white resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600" autoFocus />
                                                            <div className="flex justify-end gap-2 mt-3">
                                                                <button onClick={() => setMemoEditId(null)} className="px-3 py-1.5 bg-slate-700 text-slate-300 rounded-lg text-xs font-medium hover:bg-slate-600 transition">취소</button>
                                                                <button onClick={() => updateMemo(memo.id)} className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition">저장</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="flex items-start justify-between mb-2">
                                                                <p className="text-white font-bold text-base leading-snug flex-1">{memo.title || '메모'}</p>
                                                                <div className="flex gap-1 ml-2 opacity-0 group-hover:opacity-100 transition shrink-0">
                                                                    <button onClick={() => { setMemoEditId(memo.id); setMemoEditText(memo.text); }} className="p-1.5 text-slate-500 hover:text-blue-400 hover:bg-blue-900/30 rounded-lg transition" title="수정">
                                                                        <Edit size={14} />
                                                                    </button>
                                                                    <button onClick={() => deleteMemo(memo.id)} className="p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition" title="삭제">
                                                                        <Trash2 size={14} />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            <p className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap flex-1">{memo.text}</p>
                                                            <p className="text-xs text-slate-500 mt-3 pt-3 border-t border-slate-700/50">
                                                                {new Date(memo.createdAt).toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })}
                                                                {memo.updatedAt && <span className="text-amber-500/60 ml-2">· 수정됨</span>}
                                                            </p>
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Fixed Bottom Memo Input */}
                                    <div className="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 shadow-2xl z-50">
                                        <div className="max-w-6xl mx-auto px-4">
                                            <div className="flex justify-center -mt-3">
                                                <button onClick={() => setMemoInputExpanded(prev => !prev)} className="px-3 py-1 bg-slate-700 border border-slate-600 rounded-t-lg text-slate-400 hover:text-white transition text-xs flex items-center gap-1">
                                                    <ChevronUp size={14} style={{ transform: memoInputExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }} />
                                                    {memoInputExpanded ? '접기' : '넓게 작성'}
                                                </button>
                                            </div>
                                            <div className="py-3">
                                                {memoInputExpanded ? (
                                                    <div className="space-y-2">
                                                        <input value={memoNewTitle} onChange={e => setMemoNewTitle(e.target.value)} placeholder="메모 제목 (선택)" className="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                                        <textarea value={memoNewText} onChange={e => setMemoNewText(e.target.value)} placeholder="메모 내용을 입력하세요..." rows={4} className="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" />
                                                        <div className="flex justify-end">
                                                            <button onClick={() => { addMemo(); setMemoInputExpanded(false); }} disabled={!memoNewText.trim() && !memoNewTitle.trim()} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1.5 text-sm">
                                                                <Plus size={16} /> 메모 추가
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex gap-3 items-center">
                                                        <input value={memoNewTitle} onChange={e => setMemoNewTitle(e.target.value)} placeholder="제목 (선택)" className="w-44 px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 shrink-0" />
                                                        <input value={memoNewText} onChange={e => setMemoNewText(e.target.value)} placeholder="메모 내용을 입력하세요..."
                                                            className="flex-1 px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            onKeyDown={e => { if (e.key === 'Enter' && (memoNewText.trim() || memoNewTitle.trim())) { e.preventDefault(); addMemo(); } }} />
                                                        <button onClick={addMemo} disabled={!memoNewText.trim() && !memoNewTitle.trim()} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1.5 text-sm shrink-0">
                                                            <Plus size={16} /> 추가
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {leaderActiveTab === 'accounts' && (
                                <div className="bg-white rounded-2xl p-6 shadow-sm">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Settings size={20}/> 계정 관리</h2>
                                        <button onClick={() => setNewAccModal({ isOpen: true, name: '', userId: '', pw: '', role: 'member', team: '', salary: '' })} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition flex items-center gap-1.5">
                                            <Plus size={14}/> 계정 추가
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="min-w-full divide-y divide-slate-200">
                                            <thead className="bg-slate-50">
                                                <tr>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">이름</th>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">아이디</th>
                                                    <th className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">소속 팀</th>
                                                    <th className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">권한</th>
                                                    <th className="px-4 py-3 text-right text-xs font-bold text-slate-500 uppercase">연봉</th>
                                                    <th className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">상태</th>
                                                    <th className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">비밀번호</th>
                                                    <th className="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase">관리</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {userAccounts.map(u => (
                                                    <tr key={u.id} className="hover:bg-slate-50">
                                                        {editingAccId === u.id ? (
                                                            <>
                                                                <td className="px-4 py-3">
                                                                    <input type="text" value={editingAcc.name} onChange={(e) => setEditingAcc({...editingAcc, name: e.target.value})} className="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
                                                                </td>
                                                                <td className="px-4 py-3 text-slate-600 font-mono text-sm">{u.user_id}</td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <select value={editingAcc.team || ''} onChange={(e) => setEditingAcc({...editingAcc, team: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                                                                        <option value="">미선택</option>
                                                                        <option value="플랫폼개발팀">플랫폼개발팀</option>
                                                                        <option value="데이터전략팀">데이터전략팀</option>
                                                                        <option value="DX팀">DX팀</option>
                                                                    </select>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <select value={editingAcc.role} onChange={(e) => setEditingAcc({...editingAcc, role: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                                                                        <option value="member">팀원</option>
                                                                        <option value="admin">관리자</option>

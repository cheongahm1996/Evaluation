                                                        {editingAccId === u.id ? (
                                                            <>
                                                                <td className="px-4 py-3">
                                                                    <input type="text" value={editingAcc.name} onChange={(e) => setEditingAcc({...editingAcc, name: e.target.value})} className="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
                                                                </td>
                                                                <td className="px-4 py-3 text-slate-600 font-mono text-sm">{u.user_id}</td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <select value={editingAcc.role} onChange={(e) => setEditingAcc({...editingAcc, role: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                                                                        <option value="member">팀원</option>
                                                                        <option value="admin">관리자</option>
                                                                        <option value="leader">마스터</option>
                                                                    </select>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <button onClick={() => setEditingAcc({...editingAcc, is_active: !editingAcc.is_active})} className={`px-2 py-0.5 rounded text-xs font-bold cursor-pointer ${editingAcc.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                        {editingAcc.is_active ? '활성' : '비활성'}
                                                                    </button>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    {u.must_change_password ? <span className="text-xs text-orange-600 font-bold">변경필요</span> : <span className="text-xs text-slate-400">설정됨</span>}
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <div className="flex gap-1 justify-center">
                                                                        <button onClick={async () => {
                                                                            try {
                                                                                await SupabaseAPI.updateUser(u.user_id, { name: editingAcc.name, role: editingAcc.role, is_active: editingAcc.is_active });
                                                                                const { data } = await supabaseClient.from('users').select('*').order('name');
                                                                                setUserAccounts(data || []);
                                                                                setEditingAccId(null);
                                                                            } catch(err) { alert('수정 실패: ' + err.message); }
                                                                        }} className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 transition">
                                                                            저장
                                                                        </button>
                                                                        <button onClick={() => setEditingAccId(null)} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">
                                                                            취소
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <td className="px-4 py-3 font-medium text-slate-800">{u.name}</td>
                                                                <td className="px-4 py-3 text-slate-600 font-mono text-sm">{u.user_id}</td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <span className={`px-2 py-0.5 rounded text-xs font-bold ${u.role === 'leader' ? 'bg-purple-100 text-purple-700' : u.role === 'admin' ? 'bg-teal-100 text-teal-700' : 'bg-blue-100 text-blue-700'}`}>
                                                                        {u.role === 'leader' ? '마스터' : u.role === 'admin' ? '관리자' : '팀원'}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <span className={`px-2 py-0.5 rounded text-xs font-bold ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                        {u.is_active ? '활성' : '비활성'}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    {u.must_change_password ? <span className="text-xs text-orange-600 font-bold">변경필요</span> : <span className="text-xs text-slate-400">설정됨</span>}
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <div className="flex gap-1 justify-center">
                                                                        <button onClick={() => { setEditingAccId(u.id); setEditingAcc({ name: u.name, role: u.role, is_active: u.is_active }); }} className="px-2 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded hover:bg-blue-100 transition">
                                                                            수정
                                                                        </button>
                                                                        <button onClick={async () => {
                                                                            if (!confirm('비밀번호를 1996으로 초기화하시겠습니까?')) return;
                                                                            const hash = await hashPassword('1996');
                                                                            await supabaseClient.from('users').update({ password_hash: hash, must_change_password: true }).eq('id', u.id);
                                                                            const { data } = await supabaseClient.from('users').select('*').order('name');
                                                                            setUserAccounts(data || []);
                                                                        }} className="px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded hover:bg-orange-200 transition">
                                                                            PW초기화
                                                                        </button>
                                                                        {u.user_id !== currentUser.user_id && (
                                                                            <button onClick={async () => {
                                                                                if (!confirm(`${u.name} (${u.user_id}) 계정을 삭제하시겠습니까?`)) return;
                                                                                await supabaseClient.from('users').delete().eq('id', u.id);
                                                                                const { data } = await supabaseClient.from('users').select('*').order('name');
                                                                                setUserAccounts(data || []);
                                                                            }} className="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded hover:bg-red-200 transition">
                                                                                삭제
                                                                            </button>
                                                                        )}
                                                                        {u.role === 'admin' && (
                                                                            <button onClick={async () => {
                                                                                const { data: assignments } = await supabaseClient.from('admin_assignments').select('employee_id').eq('admin_user_id', u.user_id);
                                                                                const assignedIds = (assignments || []).map(a => a.employee_id);
                                                                                const { data: allEmps } = await supabaseClient.from('employees').select('*').order('name');
                                                                                setAssignModal({ isOpen: true, adminUserId: u.user_id, adminName: u.name, assigned: assignedIds, employees: allEmps || [] });
                                                                            }} className="px-2 py-1 bg-teal-100 text-teal-700 text-xs font-bold rounded hover:bg-teal-200 transition">
                                                                                직원 할당
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                            </>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* 새 계정 추가 모달 (별도 state) */}
                            {newAccModal.isOpen && (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4">새 계정 추가</h3>
                                        <div className="space-y-3">
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 mb-1 block">이름</label>
                                                <input type="text" value={newAccModal.name} onChange={(e) => setNewAccModal({...newAccModal, name: e.target.value})} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="홍길동" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 mb-1 block">아이디</label>
                                                <input type="text" value={newAccModal.userId} onChange={(e) => setNewAccModal({...newAccModal, userId: e.target.value})} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="ca0000" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 mb-1 block">초기 비밀번호</label>
                                                <input type="password" value={newAccModal.pw} onChange={(e) => setNewAccModal({...newAccModal, pw: e.target.value})} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="비밀번호" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 mb-1 block">권한</label>
                                                <select value={newAccModal.role} onChange={(e) => setNewAccModal({...newAccModal, role: e.target.value})} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
                                                    <option value="member">팀원</option>
                                                    <option value="admin">관리자</option>
                                                    <option value="leader">마스터</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button onClick={() => setNewAccModal({...newAccModal, isOpen: false})} className="flex-1 px-4 py-2.5 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition">취소</button>
                                            <button onClick={async () => {
                                                if (!newAccModal.name || !newAccModal.userId || !newAccModal.pw) { alert('모든 필드를 입력하세요.'); return; }
                                                try {
                                                    const pwHash = await hashPassword(newAccModal.pw);
                                                    await supabaseClient.from('employees').upsert({ name: newAccModal.name, emp_id: newAccModal.userId, dept: '' }, { onConflict: 'emp_id' });
                                                    const { data: emp } = await supabaseClient.from('employees').select('id').eq('emp_id', newAccModal.userId).single();
                                                    await supabaseClient.from('users').insert({ user_id: newAccModal.userId, name: newAccModal.name, password_hash: pwHash, role: newAccModal.role, is_active: true, must_change_password: true, employee_id: emp.id });
                                                    const { data } = await supabaseClient.from('users').select('*').order('name');
                                                    setUserAccounts(data || []);
                                                    setNewAccModal({ isOpen: false, name: '', userId: '', pw: '', role: 'member' });
                                                } catch(err) { alert('계정 추가 실패: ' + err.message); }
                                            }} className="flex-1 px-4 py-2.5 bg-blue-600 text-white font-medium rounded-xl hover:bg-blue-700 transition">추가</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        {assignModal.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200">
                                        <h3 className="text-lg font-bold text-slate-800">{assignModal.adminName} - 직원 할당</h3>
                                        <p className="text-xs text-slate-500 mt-1">관리자가 볼 수 있는 직원을 선택하세요.</p>
                                    </div>
                                    <div className="overflow-y-auto flex-1 p-4 space-y-2">
                                        {(!assignModal.employees || assignModal.employees.length === 0) ? (
                                            <p className="text-center text-slate-400 py-6">등록된 직원이 없습니다.</p>
                                        ) : (
                                            assignModal.employees.map(emp => (
                                                <label key={emp.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-teal-300 transition cursor-pointer">
                                                    <input type="checkbox" checked={assignModal.assigned.includes(emp.id)}
                                                        onChange={(e) => {
                                                            const newAssigned = e.target.checked
                                                                ? [...assignModal.assigned, emp.id]
                                                                : assignModal.assigned.filter(id => id !== emp.id);
                                                            setAssignModal(prev => ({...prev, assigned: newAssigned}));
                                                        }}
                                                        className="w-4 h-4 accent-teal-600" />
                                                    <div>
                                                        <p className="text-sm font-bold text-slate-800">{emp.name}</p>
                                                        <p className="text-xs text-slate-500">{emp.emp_id}</p>
                                                    </div>
                                                </label>
                                            ))
                                        )}
                                    </div>
                                    <div className="p-4 border-t border-slate-200 flex gap-3">
                                        <button onClick={() => setAssignModal({ isOpen: false, adminUserId: null, adminName: '', assigned: [], employees: [] })} className="flex-1 px-4 py-2.5 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition">취소</button>
                                        <button onClick={async () => {
                                            try {
                                                await supabaseClient.from('admin_assignments').delete().eq('admin_user_id', assignModal.adminUserId);
                                                if (assignModal.assigned.length > 0) {
                                                    const rows = assignModal.assigned.map(empId => ({ admin_user_id: assignModal.adminUserId, employee_id: empId }));
                                                    await supabaseClient.from('admin_assignments').insert(rows);
                                                }
                                                setAssignModal({ isOpen: false, adminUserId: null, adminName: '', assigned: [], employees: [] });
                                                setModal({ isOpen: true, title: '저장 완료', message: '직원 할당이 저장되었습니다.', type: 'success', action: closeModal });
                                            } catch(err) {
                                                alert('저장 실패: ' + err.message);
                                            }
                                        }} className="flex-1 px-4 py-2.5 bg-teal-600 text-white font-medium rounded-xl hover:bg-teal-700 transition">저장</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        </div>

                        {/* 임시 저장 불러오기 모달 (리더 내 프로젝트) */}
                        {draftModal.isOpen && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-5 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-slate-800">임시 저장 목록</h3>
                                        <button onClick={() => setDraftModal({ isOpen: false, drafts: [] })} className="p-1 text-slate-400 hover:text-slate-700 transition">
                                            <X size={20} />
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1 p-4">
                                        {draftModal.drafts.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <FileText size={32} className="mx-auto mb-3 opacity-50" />
                                                <p>임시 저장된 데이터가 없습니다.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                {draftModal.drafts.map((draft) => {
                                                    const dt = new Date(draft.savedAt);
                                                    const dateStr = dt.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
                                                    const timeStr = dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                                    const projCount = draft.employeeData?.projects?.length || 0;
                                                    return (
                                                        <div key={draft.id} className="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-blue-300 transition group">
                                                            <button onClick={() => loadDraft(draft)} className="flex-1 text-left">
                                                                <p className="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">
                                                                    {draft.period?.year} {draft.period?.quarter}
                                                                </p>
                                                                <p className="text-xs text-slate-500 mt-0.5">
                                                                    {dateStr} {timeStr} · 프로젝트 {projCount}건
                                                                </p>
                                                            </button>
                                                            <button onClick={() => deleteDraft(draft.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition opacity-0 group-hover:opacity-100">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // LEADER REVIEW
            if (mode === 'leader-review') {
                const overallScore = calculateIncentiveScore(importedData.projects, leaderEval);

                return (
                    <div className="min-h-screen bg-slate-50 pb-32">
                        <div className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={() => setMode('leader-home')} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition font-medium">
                                    <ChevronLeft size={18} /> 돌아가기
                                </button>
                                <div className="flex items-center gap-4">
                                    <span className="text-sm font-bold text-slate-800">{importedData.name} - {period.year} {period.quarter}</span>
                                    <div className="flex gap-2 no-print">
                                        <button onClick={downloadLeaderJPG} className="flex items-center gap-2 px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium">
                                            <DownloadImage size={16} /> JPG 다운로드
                                        </button>
                                        <button onClick={() => window.print()} className="flex items-center gap-2 px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium">
                                            <Printer size={16} /> 인쇄
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="leader-content-area" className="max-w-6xl mx-auto px-4 py-8">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8">
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">{importedData.name} - 리더 피드백</h2>
                                <p className="text-slate-500 mb-6">{period.year} {period.quarter}</p>

                                <SummaryTable projects={importedData.projects} />

                                <div className="space-y-6">
                                    {importedData.projects.map((project, idx) => (
                                        <ProjectCard
                                            key={project.id || idx}
                                            project={project}
                                            index={idx}
                                            isLeader={true}
                                            onUpdate={() => {}}
                                            leaderEvalData={leaderEval[idx]}
                                            onUpdateLeaderEval={updateLeaderEval}
                                        />
                                    ))}
                                </div>

                                <AdditionalInfoSection data={importedData} onChange={() => {}} isLeader={true} />

                                <CompensationCard overallScore={overallScore} setCompData={setCompData} compData={compData} />
                            </div>
                        </div>

                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl no-print">
                            <div className="max-w-6xl mx-auto px-4 py-4 flex gap-3">
                                <button onClick={() => setMode('leader-home')} className="flex-1 py-3 bg-slate-200 text-slate-800 rounded-lg font-bold hover:bg-slate-300 transition">
                                    취소
                                </button>
                                <button onClick={confirmLeaderComplete} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                                    <Save size={18} /> 저장 및 리포트 보기
                                </button>
                            </div>
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            // LEADER REPORT (DASHBOARD)
            if (mode === 'leader-report') {
                const overallScore = calculateIncentiveScore(importedData.projects, leaderEval);
                const numScore = Number(overallScore);
                let grade = 'B-C'; let gradeColor = 'text-gray-600 bg-slate-100';
                if (numScore >= 9.0) { grade = 'S'; gradeColor = 'text-purple-700 bg-purple-100'; }
                else if (numScore >= 8.0) { grade = 'A'; gradeColor = 'text-green-700 bg-green-100'; }

                const downloadReportImage = () => {
                    const element = document.getElementById('report-capture-area');
                    if (!element) return;
                    html2canvas(element, {
                        scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#f8fafc',
                        ignoreElements: (el) => el.classList.contains('no-print') || el.hasAttribute('data-html2canvas-ignore')
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `리포트_${importedData.name}_${period.year}${period.quarter}.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                        link.click();
                    });
                };

                return (
                    <div className="min-h-screen bg-slate-100">
                        {/* Header */}
                        <div className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm no-print">
                            <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
                                <div className="flex gap-2">
                                    <button onClick={() => setMode('leader-home')} className="flex items-center gap-1.5 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition text-sm font-medium">
                                        <ChevronLeft size={16} /> 목록으로
                                    </button>
                                    <button onClick={() => setMode('leader-review')} className="flex items-center gap-1.5 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition text-sm font-medium">
                                        수정 화면으로
                                    </button>
                                </div>
                                <h1 className="text-lg font-bold text-slate-800">리포트</h1>
                                <button onClick={downloadReportImage} className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-bold">
                                    <Printer size={16} /> 리포트 출력 (PDF)
                                </button>
                            </div>
                        </div>

                        <div id="report-capture-area" className="max-w-5xl mx-auto px-4 py-8 space-y-6">
                            {/* Employee Summary Card */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                                            <User size={28} />
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800">{importedData.name}</h2>
                                            <p className="text-slate-500 text-sm">{importedData.empId} / {importedData.dept || '-'} / {importedData.responsibilities || '-'}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Incentive Score</p>
                                            <p className="text-3xl font-black text-slate-800">{overallScore} <span className="text-base font-normal text-slate-400">/ 10</span></p>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Confirmed Level</p>
                                            <p className="text-3xl font-black text-slate-800">{compData.level || '-'}</p>
                                        </div>
                                        <div className={`text-center px-5 py-3 rounded-xl ${gradeColor}`}>
                                            <p className="text-[10px] font-bold uppercase tracking-wider opacity-70">Incentive Grade</p>
                                            <p className="text-3xl font-black">{grade}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 보상 제안 내역 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h3 className="text-lg font-bold text-slate-800 mb-5">보상 제안 내역</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div>
                                        <p className="text-xs text-slate-400 font-medium mb-1">Current Level & Salary</p>
                                        <p className="text-slate-700 font-medium">{compData.currentLevel || '-'} / {compData.currentSalary ? formatNumber(compData.currentSalary) + ' 원' : '0 원'}</p>
                                        <div className="mt-4">
                                            <p className="text-xs text-blue-600 font-bold mb-1">제안 인센티브</p>
                                            <p className="text-2xl font-black text-slate-800">{compData.isIncentiveTarget && compData.incentiveAmount ? formatNumber(compData.incentiveAmount) + ' 원' : '0 원'}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="text-xs text-blue-600 font-bold mb-1">제안 연봉 (확정안)</p>
                                        {compData.isSalaryTarget ? (
                                            <p className="text-2xl font-black text-slate-800">{compData.salaryAmount ? formatNumber(compData.salaryAmount) + ' 원' : '-'}</p>
                                        ) : (
                                            <p className="text-lg text-slate-400">연봉 협상 대상자 아님</p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* 리더 피드백 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h3 className="text-lg font-bold text-slate-800 mb-5">리더 피드백</h3>
                                <div className="space-y-5">
                                    <div>
                                        <p className="flex items-center gap-2 text-sm font-bold text-blue-600 mb-2"><ThumbsUp size={16} /> 강점 및 긍정적 피드백</p>
                                        <div className="bg-slate-50 rounded-xl p-4 min-h-[40px]">
                                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{compData.strength || '내용 없음'}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="flex items-center gap-2 text-sm font-bold text-amber-600 mb-2"><TrendingUp size={16} /> 개선 및 성장 제안</p>
                                        <div className="bg-slate-50 rounded-xl p-4 min-h-[40px]">
                                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{compData.improvements || '내용 없음'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 프로젝트별 세부 성과 분석 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h3 className="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2">
                                    <List size={18} className="text-slate-500" /> 프로젝트별 세부 성과 분석
                                </h3>
                                <div className="border-b border-slate-200 pb-2 mb-2 grid grid-cols-12 text-[10px] font-bold text-slate-500 uppercase">
                                    <div className="col-span-6">프로젝트 및 역할</div>
                                    <div className="col-span-3 text-center">KPI</div>
                                    <div className="col-span-3 text-right">평가 결과</div>
                                </div>
                                {importedData.projects.map((proj, idx) => {
                                    const evalData = leaderEval[idx];
                                    const avg = calculateAverage(evalData);
                                    const projGrade = getGrade(avg);
                                    return (
                                        <div key={proj.id || idx} className="grid grid-cols-12 py-4 border-b border-slate-100 last:border-b-0 items-start">
                                            <div className="col-span-6">
                                                <p className="font-bold text-slate-800 text-sm">{proj.name || '-'}</p>
                                                <p className="text-slate-500 text-xs mt-0.5">
                                                    {proj.actStart || '-'} ~ {proj.isOngoing ? '진행중' : (proj.actEnd || '-')}
                                                    {' '}
                                                    <span className="text-blue-600 font-bold">{getDurationText(proj.actStart, proj.isOngoing ? new Date() : proj.actEnd)}</span>
                                                </p>
                                                <div className="flex flex-wrap gap-1 mt-1.5">
                                                    {proj.role && <span className="inline-block px-1.5 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-medium rounded">{proj.role}</span>}
                                                    {proj.contribution && <span className="inline-block px-1.5 py-0.5 bg-blue-50 text-blue-700 text-[10px] font-bold rounded border border-blue-100">{proj.contribution}</span>}
                                                    {proj.opsStatus && <span className="inline-block px-1.5 py-0.5 bg-amber-50 text-amber-700 text-[10px] font-medium rounded border border-amber-100">{proj.opsStatus.split('(')[0]}</span>}
                                                </div>
                                            </div>
                                            <div className="col-span-3 text-center text-xs text-slate-600 pt-1">
                                                {proj.kpi || '-'}
                                            </div>
                                            <div className="col-span-3 text-right">
                                                <p className="text-xl font-black text-slate-800">{avg}</p>
                                                <span className={`inline-block mt-0.5 px-2 py-0.5 rounded text-[10px] font-bold ${projGrade === 'S' ? 'bg-purple-100 text-purple-700' : projGrade === 'A' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}`}>{projGrade}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <ConfirmModal isOpen={modal.isOpen} title={modal.title} message={modal.message} type={modal.type} onConfirm={modal.action} onCancel={closeModal} />
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
